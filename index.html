<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>B.L.U.E. — The universal skills encyclopedia</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="A free, community-built encyclopedia of practical skills. Read, write, and verify lessons on how to do anything." />
<style>
  /* =====================================================
     B.L.U.E. — Working prototype
     Single-file. No dependencies. Persists to localStorage.
     Wikipedia-style layout, four-level reading system.
     ===================================================== */

  :root {
    /* Wikipedia Vector palette */
    --bg: #ffffff;
    --chrome: #f8f9fa;
    --chrome-2: #eaecf0;
    --border: #c8ccd1;
    --border-soft: #eaecf0;
    --ink: #202122;
    --ink-soft: #54595d;
    --muted: #72777d;
    --link: #36c;
    --link-visited: #795cb2;
    --link-red: #d33;
    --rule: #a2a9b1;

    /* Plain-words / TL;DR / level palette */
    --plain-bg: #e8f4fb; --plain-border: #4b8bbe;
    --tldr-bg: #fef6e7;  --tldr-border: #c48f00;
    --lev1-bg: #e8f6ee; --lev1-text: #14764a;
    --lev2-bg: #e8f0fb; --lev2-text: #2c5282;
    --lev3-bg: #fdf3d8; --lev3-text: #8a6500;
    --lev4-bg: #fbe7e8; --lev4-text: #9b2c2c;

    --serif: "Linux Libertine", "Georgia", "Times New Roman", Times, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  [data-theme="dark"] {
    --bg: #0f1419; --chrome: #181d24; --chrome-2: #1f252e;
    --border: #2f3640; --border-soft: #232932; --rule: #4a525e;
    --ink: #e8eaed; --ink-soft: #b5bcc7; --muted: #8893a3;
    --link: #79a6ff; --link-visited: #b39cff;
    --plain-bg: #16243a; --plain-border: #4b8bbe;
    --tldr-bg: #2a2410;  --tldr-border: #c48f00;
    --lev1-bg: #14301f; --lev2-bg: #14253c; --lev3-bg: #2b250e; --lev4-bg: #2c1416;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
  html, body {
    margin: 0; min-height: 100%; background: var(--bg); color: var(--ink);
    font-family: var(--sans);
    font-size: clamp(15px, 0.95rem + 0.1vw, 16px);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--link); text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }
  a:visited { color: var(--link-visited); }
  a.red, a.red:visited { color: var(--link-red); }
  button { font: inherit; cursor: pointer; }
  input, textarea, select {
    background: var(--bg); color: var(--ink); border: 1px solid var(--border);
    padding: 7px 10px; font: inherit; width: 100%; border-radius: 2px;
  }
  input:focus, textarea:focus, select:focus {
    outline: 2px solid var(--link); outline-offset: 1px; border-color: var(--link);
  }
  textarea { min-height: 100px; resize: vertical; font-family: var(--sans); }
  label { display: block; font-size: 13px; color: var(--ink-soft); margin-bottom: 4px; font-weight: 600; }
  :focus { outline: none; }
  :focus-visible { outline: 2px solid var(--link); outline-offset: 2px; border-radius: 3px; }
  .skip-link {
    position: absolute; top: -40px; left: 8px; z-index: 1000;
    background: var(--link); color: #fff; padding: 8px 14px;
    border-radius: 3px; font-weight: 600;
  }
  .skip-link:focus { top: 8px; text-decoration: none; }

  /* =====================================================
     TOP BAR
     ===================================================== */
  .topbar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 18px;
    position: sticky; top: 0; z-index: 50;
  }
  .logo { display: flex; align-items: baseline; gap: 10px; cursor: pointer; }
  .logo-mark {
    font-family: var(--serif); font-style: italic;
    font-size: 26px; color: var(--ink); line-height: 1;
  }
  .logo-mark .b { color: var(--link); }
  .logo-tag {
    font-size: 12px; color: var(--muted);
    font-variant: small-caps; letter-spacing: 0.5px;
  }
  .spacer { flex: 1; }
  .search-wrap { position: relative; max-width: 360px; flex: 0 1 320px; }
  .search {
    padding-left: 32px; padding-right: 50px;
    background: var(--chrome); border-color: var(--border);
    font-size: 13px;
  }
  .search-wrap::before {
    content: "🔍"; position: absolute; left: 9px; top: 50%;
    transform: translateY(-50%); font-size: 13px; pointer-events: none; opacity: .6;
  }
  .kbd {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: var(--muted); pointer-events: none;
    border: 1px solid var(--border-soft); padding: 1px 5px; border-radius: 3px;
    background: var(--bg);
  }
  .header-links { display: flex; gap: 12px; font-size: 13px; }
  .header-links a { color: var(--link); }
  .icon-btn {
    background: transparent; border: 1px solid transparent;
    width: 30px; height: 30px; border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--ink-soft);
  }
  .icon-btn:hover { background: var(--chrome); }

  /* Tabs (article namespace tabs, Wikipedia-style) */
  .tabbar {
    background: var(--chrome);
    border-bottom: 1px solid var(--border-soft);
    padding: 0 24px;
    display: flex;
    font-size: 13px;
    overflow-x: auto;
  }
  .tabbar .tab {
    padding: 8px 14px;
    border-right: 1px solid var(--border-soft);
    color: var(--link); cursor: pointer; user-select: none;
    white-space: nowrap;
  }
  .tabbar .tab:hover { background: var(--bg); }
  .tabbar .tab.active {
    background: var(--bg); color: var(--ink); font-weight: 600;
    border-top: 2px solid var(--link); padding-top: 6px;
    margin-bottom: -1px;
  }

  /* =====================================================
     LAYOUT
     ===================================================== */
  .layout {
    display: grid;
    grid-template-columns: 200px 1fr;
    max-width: 1280px;
    margin: 0 auto;
    padding: 16px 24px 60px;
    gap: 28px;
  }
  .layout.single { grid-template-columns: 1fr; max-width: 900px; }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; padding: 16px; gap: 16px; }
    .sidebar { display: none; }
    .sidebar.open { display: block; position: fixed; top: 0; left: 0; bottom: 0; width: 260px; max-width: 80vw; background: var(--bg); border-right: 1px solid var(--border); padding: 20px; z-index: 95; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
    .hamburger { display: inline-flex !important; }
  }
  .scrim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 90; }
  .scrim.open { display: block; }
  .hamburger {
    display: none; background: transparent; border: 1px solid var(--border);
    width: 32px; height: 32px; border-radius: 3px; align-items: center;
    justify-content: center; font-size: 16px; color: var(--ink);
  }

  /* =====================================================
     SIDEBAR
     ===================================================== */
  .sidebar { font-size: 12px; }
  .sidebar h4 {
    font-size: 11px; color: var(--muted); font-weight: 400;
    margin: 16px 0 4px;
    border-bottom: 1px solid var(--border-soft); padding-bottom: 3px;
  }
  .sidebar h4:first-child { margin-top: 0; }
  .sidebar ul { list-style: none; padding: 0; margin: 0; }
  .sidebar li { padding: 2px 0; line-height: 1.5; }
  .sidebar a { color: var(--link); }
  /* Scalable subject tree (handles 500+ subjects) */
  .sidebar .subj-filter {
    width: 100%; padding: 4px 8px; font-size: 12px;
    border: 1px solid var(--border-soft); background: var(--bg);
    margin-bottom: 6px;
  }
  .sidebar .subj-filter:focus { outline: 1px solid var(--link); border-color: var(--link); }
  .sidebar .subj-tree-wrap {
    max-height: 360px; overflow-y: auto; overflow-x: hidden;
    border: 1px solid var(--border-soft); background: var(--chrome);
    padding: 4px 6px; font-size: 12px;
  }
  .sidebar .subj-tree-wrap::-webkit-scrollbar { width: 6px; }
  .sidebar .subj-tree-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .sidebar .subj-tree ul { list-style: none; padding-left: 12px; margin: 0; }
  .sidebar .subj-tree > ul { padding-left: 0; }
  .sidebar .subj-tree li { padding: 0; line-height: 1.4; }
  .sidebar .subj-row {
    cursor: pointer; padding: 2px 4px; display: flex; align-items: center; gap: 4px;
    border-radius: 2px; color: var(--link);
  }
  .sidebar .subj-row:hover { background: var(--bg); }
  .sidebar .subj-row.active { background: var(--plain-bg); color: var(--ink-soft); font-weight: 600; }
  .sidebar .subj-row.active-leaf { color: var(--ink); font-weight: 700; }
  .sidebar .subj-row .caret {
    width: 10px; font-size: 9px; color: var(--muted); flex-shrink: 0;
    transition: transform .12s; display: inline-flex; justify-content: center;
  }
  .sidebar .subj-row .caret.open { transform: rotate(90deg); }
  .sidebar .subj-row .caret.leaf { color: transparent; }
  .sidebar .subj-row .name {
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sidebar .subj-row .name mark {
    background: #fef3c7; color: inherit; padding: 0;
  }
  .sidebar .count {
    color: var(--muted); font-size: 10px; padding: 0 5px;
    background: var(--bg); border-radius: 8px; min-width: 18px;
    text-align: center; flex-shrink: 0;
  }
  .sidebar .subj-row.active .count { background: var(--chrome-2); }
  .sidebar .subj-tree li.collapsed > ul { display: none; }
  .sidebar .subj-tree li.hide { display: none; }
  .sidebar .browse-all-link {
    display: block; text-align: center; padding: 6px 0;
    margin-top: 6px; font-size: 11px; color: var(--muted);
    border-top: 1px dotted var(--border-soft);
  }
  .sidebar .browse-all-link:hover { color: var(--link); }
  .sidebar .subj-empty {
    padding: 16px 8px; text-align: center; color: var(--muted); font-size: 11px;
  }

  /* =====================================================
     ARTICLE
     ===================================================== */
  .article { background: var(--bg); min-height: 70vh; }
  .article h1.firstHeading {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif !important;
    font-size: clamp(24px, 1.4rem + 0.8vw, 30px);
    font-weight: 700; line-height: 1.25;
    margin: 0 0 4px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-soft);
    scroll-margin-top: 70px;
  }
  .article .subtitle {
    font-size: 13px; color: var(--muted); font-style: italic;
    margin: 0 0 18px;
  }
  .article h2 {
    font-family: var(--serif); font-weight: 400; font-size: 22px;
    border-bottom: 1px solid var(--border-soft);
    padding-bottom: 4px; margin: 28px 0 12px;
    scroll-margin-top: 70px;
  }
  .article h3 {
    font-family: var(--serif); font-weight: 600; font-size: 17px;
    margin: 20px 0 6px;
    scroll-margin-top: 70px;
  }
  .article p { margin: 0.6em 0; max-width: 70ch; }
  .article ul, .article ol { padding-left: 1.6em; max-width: 70ch; }
  .article li { margin: 0.3em 0; }
  .article code {
    background: var(--chrome); padding: 1px 6px; border-radius: 2px;
    font-family: var(--mono); font-size: 0.9em;
  }
  .article pre {
    background: var(--chrome); padding: 10px 12px; border: 1px solid var(--border-soft);
    overflow-x: auto; font-family: var(--mono); font-size: 13px; line-height: 1.5;
    max-width: 75ch;
  }
  .article table.data {
    border-collapse: collapse; margin: 14px 0; font-size: 14px;
    border: 1px solid var(--border);
  }
  .article table.data th, .article table.data td {
    border: 1px solid var(--border); padding: 6px 12px; text-align: left; vertical-align: top;
  }
  .article table.data th { background: var(--chrome); font-weight: 600; }

  /* Hatnote */
  .hatnote {
    padding: 4px 0 4px 30px;
    font-style: italic; font-size: 13px; color: var(--ink-soft);
    margin-bottom: 10px;
  }

  /* Plain-words box */
  .plain {
    background: var(--plain-bg); border: 1px solid var(--plain-border); border-left-width: 5px;
    padding: 14px 18px; margin: 14px 0 20px; border-radius: 3px; max-width: 70ch;
  }
  .plain .lbl {
    font-size: 12px; font-weight: 700; color: var(--plain-border);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .plain p { margin: 0.3em 0; font-size: 15px; }
  .plain p:first-of-type { margin-top: 0; }
  .plain p:last-of-type { margin-bottom: 0; }

  /* TL;DR box */
  .in-short {
    background: var(--tldr-bg); border: 1px solid var(--tldr-border);
    border-radius: 3px; padding: 12px 16px; margin: 14px 0; max-width: 70ch;
  }
  .in-short .lbl {
    font-size: 11px; font-weight: 700; color: var(--tldr-border);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
  }
  .in-short ul { margin: 4px 0 0; padding-left: 22px; max-width: none; }
  .in-short li { padding: 2px 0; font-size: 14px; }

  /* Infobox */
  .infobox {
    float: right; width: 290px; margin: 0 0 14px 24px;
    border: 1px solid var(--border); background: var(--chrome);
    font-size: 13px;
  }
  .infobox-title {
    background: var(--chrome-2); padding: 8px 10px; text-align: center;
    font-family: var(--sans); font-weight: 700; font-size: 15px;
    border-bottom: 1px solid var(--border);
  }
  .infobox table { width: 100%; border-collapse: collapse; }
  .infobox th, .infobox td {
    padding: 5px 9px; border-bottom: 1px solid var(--border-soft);
    text-align: left; vertical-align: top; font-weight: 400;
  }
  .infobox th { color: var(--muted); width: 110px; font-weight: 600; font-size: 12px; }
  .infobox tr:last-child th, .infobox tr:last-child td { border-bottom: 0; }
  .infobox .ib-actions {
    padding: 10px; border-top: 1px solid var(--border-soft);
    display: flex; flex-direction: column; gap: 6px;
  }
  .infobox .ib-actions a { font-size: 13px; }
  @media (max-width: 700px) {
    .infobox { float: none; width: 100%; margin: 0 0 14px; }
  }

  /* TOC */
  .toc {
    background: var(--chrome); border: 1px solid var(--border-soft);
    padding: 8px 14px; margin: 14px 0;
    font-size: 13px; display: inline-block; min-width: 240px;
  }
  .toc-title {
    font-weight: 700; text-align: center; padding-bottom: 4px;
    border-bottom: 1px solid var(--border-soft); margin-bottom: 6px;
    font-size: 12px; color: var(--ink-soft);
  }
  .toc ol { list-style: none; padding-left: 0; margin: 0; counter-reset: toc; max-width: none; }
  .toc ol ol { padding-left: 18px; }
  .toc li { counter-increment: toc; padding: 1px 0; margin: 0; }
  .toc li::before { content: counters(toc, ".") " "; color: var(--muted); margin-right: 4px; }

  /* Layer stack (Level 1-4) */
  .layer-stack {
    border: 1px solid var(--border); border-radius: 3px;
    margin: 14px 0; max-width: 72ch;
  }
  .layer { display: grid; grid-template-columns: 140px 1fr; border-bottom: 1px solid var(--border-soft); }
  .layer:last-child { border-bottom: 0; }
  .layer-tag {
    padding: 14px 14px; font-size: 13px;
    border-right: 1px solid var(--border-soft);
    display: flex; flex-direction: column; gap: 4px;
  }
  .layer-tag .lev { font-weight: 700; color: var(--ink); }
  .layer-tag .who { font-size: 11px; color: var(--muted); line-height: 1.35; }
  .layer-tag .time { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .layer-body { padding: 14px 18px; font-size: 14px; line-height: 1.65; }
  .layer-body p { margin: 0.4em 0; max-width: none; }
  .layer.lev-1 .layer-tag { background: var(--lev1-bg); }
  .layer.lev-2 .layer-tag { background: var(--lev2-bg); }
  .layer.lev-3 .layer-tag { background: var(--lev3-bg); }
  .layer.lev-4 .layer-tag { background: var(--lev4-bg); }
  .layer.lev-1 .layer-tag .lev { color: var(--lev1-text); }
  .layer.lev-2 .layer-tag .lev { color: var(--lev2-text); }
  .layer.lev-3 .layer-tag .lev { color: var(--lev3-text); }
  .layer.lev-4 .layer-tag .lev { color: var(--lev4-text); }
  @media (max-width: 600px) {
    .layer { grid-template-columns: 1fr; }
    .layer-tag { border-right: 0; border-bottom: 1px solid var(--border-soft); padding: 8px 12px; }
  }

  /* Categories footer */
  .categories {
    border: 1px solid var(--border-soft); background: var(--chrome);
    padding: 6px 12px; margin-top: 32px; font-size: 13px;
  }
  .categories-label { color: var(--ink-soft); font-weight: 600; margin-right: 8px; }
  .categories a { margin-right: 10px; }

  /* Footer */
  .footer {
    border-top: 1px solid var(--border); padding: 20px 24px;
    text-align: center; color: var(--muted); font-size: 12px;
    background: var(--chrome); margin-top: 40px;
  }

  /* =====================================================
     COMPONENTS
     ===================================================== */
  .level-tag {
    display: inline-block; padding: 2px 9px; font-size: 11px;
    border-radius: 999px; font-weight: 700; margin-right: 6px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .level-tag.l1 { background: var(--lev1-bg); color: var(--lev1-text); }
  .level-tag.l2 { background: var(--lev2-bg); color: var(--lev2-text); }
  .level-tag.l3 { background: var(--lev3-bg); color: var(--lev3-text); }
  .level-tag.l4 { background: var(--lev4-bg); color: var(--lev4-text); }

  .status {
    display: inline-block; padding: 2px 8px; font-size: 11px;
    border-radius: 2px; font-weight: 600; color: var(--ink-soft);
    background: var(--chrome); border: 1px solid var(--border-soft);
    text-transform: lowercase;
  }
  .status.PUBLISHED { background: var(--lev1-bg); color: var(--lev1-text); }
  .status.IN_REVIEW { background: var(--lev3-bg); color: var(--lev3-text); }
  .status.RETURNED { color: var(--lev4-text); background: var(--lev4-bg); }
  .status.OPEN { background: var(--lev3-bg); color: var(--lev3-text); }
  .status.RESOLVED, .status.ACCEPTED, .status.FUNDED { background: var(--lev1-bg); color: var(--lev1-text); }
  .status.PROPOSED, .status.UNDER_REVIEW { background: var(--lev2-bg); color: var(--lev2-text); }
  .status.DISMISSED, .status.REJECTED { color: var(--muted); }

  .btn {
    background: var(--chrome); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 2px;
    color: var(--ink); font-size: 13px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px; min-height: 30px;
  }
  .btn:hover { background: var(--chrome-2); border-color: var(--ink-soft); }
  .btn.primary { background: var(--link); color: #fff; border-color: var(--link); }
  .btn.primary:hover { background: #2855b4; border-color: #2855b4; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.sm { padding: 4px 10px; font-size: 12px; min-height: 26px; }

  .actions-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .form-row { margin-bottom: 14px; }
  .form-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .pick-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .pick-list .pick {
    padding: 5px 12px; border: 1px solid var(--border); background: var(--bg);
    font-size: 13px; cursor: pointer; color: var(--ink); border-radius: 2px;
    display: inline-flex; align-items: center; gap: 5px; min-height: 28px;
  }
  .pick-list .pick:hover { background: var(--chrome); }
  .pick-list .pick.sel { background: var(--link); color: #fff; border-color: var(--link); }

  /* Card list */
  .card-list { display: grid; gap: 10px; }
  .card {
    border: 1px solid var(--border-soft); background: var(--bg);
    padding: 12px 14px; transition: border-color .1s;
  }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { border-color: var(--link); }
  .card .card-title { font-weight: 600; font-size: 15px; color: var(--ink); margin-bottom: 4px; }
  .card .card-meta { color: var(--muted); font-size: 12px; display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .card-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }

  /* Lesson row (in browse) */
  .lesson-row {
    padding: 10px 12px; border: 1px solid var(--border-soft);
    margin: 6px 0; background: var(--bg); cursor: pointer;
    display: flex; gap: 12px; align-items: baseline;
  }
  .lesson-row:hover { border-color: var(--link); }
  .lesson-row .ltitle { font-weight: 600; color: var(--ink); flex: 1; }
  .lesson-row .lmeta { color: var(--muted); font-size: 12px; display: flex; gap: 10px; flex-wrap: wrap; }

  /* Stats strip */
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin: 14px 0;
  }
  .stat-card {
    padding: 12px; border: 1px solid var(--border-soft); background: var(--chrome);
    text-align: center;
  }
  .stat-card .n { font-family: var(--sans); font-size: 24px; font-weight: 700; color: var(--ink); }

        id: "g-resistor",
        topicId: "elec-components", level: 1,
        title: "How to make a resistor",
        author: "kira", coAuthors: ["otto","mei"],
        status: "PUBLISHED",
        thumbsUp: 1247, thumbsDown: 14, prereqs: [],
        publishedAt: Date.now() - 86400000 * 14,
        translations: ["es","de","ja","fr"],
        plainWords: "A **resistor** is a small part that slows down electricity. Imagine a wide pipe with water flowing through it — a resistor is like pinching the pipe so less water gets through. They are used in almost every electronic thing: lights, radios, computers. This lesson shows you four ways to make one yourself, from a five-minute hack with a pencil all the way to growing one inside a silicon chip.",
        inShort: [
          "A resistor is a passive two-terminal component that limits the flow of electric current.",
          "Resistance is measured in **ohms (Ω)**. **V = I × R** (Ohm's Law).",
          "Four methods at four difficulty levels: pencil graphite, carbon-composition, wire-wound, thin-film deposition.",
          "No prerequisites for Level 1. Higher levels assume basic electronics knowledge.",
          "You will be able to make a resistor between 1 Ω and 10 MΩ."
        ],
        body: `A **resistor** is a passive electrical component that implements electrical resistance as a circuit element. Resistors are used to reduce current flow, divide voltages, bias active elements, terminate transmission lines, and many other functions. Resistance is one of the three fundamental passive properties of any electrical component, alongside [[capacitance]] and [[inductance]].\n\nThe resistance value R of a component is defined by Ohm's law, **V = I × R**, where V is the voltage applied across the component, I is the current flowing through it, and R is the resistance, measured in [[ohms (Ω)]]. The earliest known artificial resistor was a length of carbon filament made by [[Thomas Edison]] in 1879 for use in his incandescent lamp.\n\n## How it works (four levels)\n\nClick the level that matches what you already know. Each level explains the same idea — just in deeper language.\n\nLAYERSTACK\n\n## Methods\n\nFour methods are documented on B.L.U.E., one at each difficulty level. Pick the one that suits your tools, your budget, and how precise you need to be.\n\nMETHODSTACK\n\n## How to read the colour bands\n\nManufactured resistors use coloured bands to indicate their value. The first two bands are digits, the third is a multiplier, and the fourth is the tolerance.\n\nCOLORTABLE\n\nExample: Brown-Black-Red-Gold reads as 1, 0, ×100, ±5% = **1,000 Ω = 1 kΩ ± 5%**.\n\n## How to check it works\n\nWhichever method you used, you can test your resistor with a multimeter:\n\n1. Set the multimeter to **resistance mode** (the symbol is Ω).\n2. Touch one probe to each terminal of the resistor.\n3. Read the value on the display.\n4. Compare with what you expected.\n\n## See also\n\n- [[Capacitor]] — stores electrical charge\n- [[Inductor]] — stores energy in a magnetic field\n- [[Ohm's Law]]\n- [[Wheatstone bridge]]`,
        layers: [
          { level: 1, who: "For anyone, even kids", time: "30 sec", body: "Electricity is a bit like water flowing through a hose. A resistor is like pinching the hose with your fingers — less water gets through. The harder you pinch, the less gets through. That's all a resistor does: it pinches the flow of electricity." },
          { level: 2, who: "School-level science", time: "1 min", body: "When electric current flows through a material, the electrons bump into atoms and lose some energy as heat. Some materials let electrons through easily (good conductors, like copper); others resist them strongly (like rubber). A resistor is a piece of material chosen to resist the current by a specific known amount, measured in **ohms (Ω)**. The bigger the resistance, the less current flows for the same voltage. This relationship is **Ohm's Law: V = I × R**." },
          { level: 3, who: "Hobbyist / student", time: "2 min", body: "A resistor's resistance is determined by the material's resistivity (ρ), its length (L), and its cross-sectional area (A): **R = ρ × L / A**. To make a resistor of a chosen value, pick a material with known ρ and shape it to the right L and A. Real resistors also have a tolerance (typical: ±1% to ±10%), a power rating (¼ W, ½ W, 1 W…), and a temperature coefficient. Above ~100 kHz, parasitic inductance and capacitance start to matter; for high-frequency work, choose a resistor designed for it." },
          { level: 4, who: "Specialist / engineer", time: "3 min", body: "In the diffusive transport regime, ρ = 1/(n·q·μ) where n is carrier concentration, q the elementary charge, μ the mobility. Thin-film resistors are characterised by sheet resistance Rs = ρ/t. For NiCr films, Rs typically falls 25–300 Ω/sq with TCRs of ±25 ppm/°C achievable post-laser-trim. At GHz frequencies the lumped model breaks down; consider distributed parasitics, skin-depth effects, and substrate dielectric loss. Johnson–Nyquist noise sets the lower bound on voltage noise: Vn = √(4·kB·T·R·Δf)." }
        ],
        methods: [
          { id: "m1", name: "The pencil trick", level: 1, isMain: false, uses: 240, body: "**5 minutes, in your house.** Draw a thick rectangle with a soft pencil (6B works great) about 5cm long. Go over it 20+ times so the line is solid. Attach a paper clip to each end. You've made a resistor of roughly 1-50 kΩ. The longer and thinner you draw it, the higher the resistance.", helpfulUp: 180, helpfulDown: 24 },
          { id: "m2", name: "Carbon-composition", level: 2, isMain: true, uses: 1850, body: "**A weekend in the workshop.** Mix graphite powder with phenolic resin (4 parts to 1). Mould into a straw, push a wire into each end, bake at 150°C for an hour. Slip off the straw. Measure with a multimeter — typically falls 100Ω to 10kΩ. Tolerance is poor (±20%) but this is how resistors were made 1920–1970.", helpfulUp: 1240, helpfulDown: 38 },
          { id: "m3", name: "Wire-wound precision", level: 3, isMain: false, uses: 920, body: "**±1% tolerance.** Wrap a long thin wire of nichrome around a ceramic former. For 100Ω, calculate L using R = ρL/A: with 0.3mm nichrome wire, you need ≈6.4m of wire. Bifilar-wind to minimise inductance. Solder to end-caps and coat with heat-resistant lacquer. Used for instrumentation since the early 20th century.", helpfulUp: 820, helpfulDown: 12 },
          { id: "m4", name: "Thin-film deposition", level: 4, isMain: false, uses: 280, body: "**The chip-fab method.** Sputter NiCr or TaN onto an alumina substrate inside a vacuum chamber, controlling thickness to ±2%. Pattern with photolithography, etch, deposit contact metal, anneal at 300°C. Laser-trim each resistor with a Q-switched Nd:YAG until it reads target value within ±0.005%. This is how resistors inside microchips are made.", helpfulUp: 310, helpfulDown: 8 }
        ],
        vendors: [
          { name: "Mouser — Through-hole resistor kit (¼W, 1%)", rating: 4.7 },
          { name: "Digi-Key — Vishay precision 0.1% pack", rating: 4.6 },
          { name: "Adafruit — Beginner kit (100 mixed values)", rating: 4.4 }
        ]
      },
      {
        id: "g-bjt",
        topicId: "elec-components", level: 2,
        title: "Build a bipolar junction transistor (BJT)",
        author: "kira", coAuthors: ["otto"],
        status: "PUBLISHED",
        thumbsUp: 412, thumbsDown: 9, prereqs: ["g-resistor"],
        publishedAt: Date.now() - 86400000 * 90,
        translations: ["es","de","ja"],
        plainWords: "A **transistor** is a tiny switch made from a special rock called silicon. It is the basic building block of every computer, phone, TV and game console. This lesson teaches you how to make one yourself.",
        inShort: [
          "A BJT is a 3-pin semiconductor device used as an amplifier or switch.",
          "Made from doped silicon with two p–n junctions.",
          "Takes a weekend to fabricate; requires a diffusion furnace.",
          "Prerequisite: the resistor lesson (Level 1)."
        ],
        body: `A **bipolar junction transistor** (BJT) is a type of [[transistor]] that uses both electron and electron-hole charge carriers. The device is fabricated from [[silicon]] doped with two different impurities to form two adjacent [[p–n junctions]], and is the foundational active component of all classical digital logic circuits described elsewhere in this encyclopedia.\n\n## Methods\n\nMETHODSTACK\n\n## See also\n\n- [[Field-effect transistor (FET)]]\n- [[p–n junction]]\n- [[Semiconductor fabrication]]`,
        layers: [],
        methods: [
          { id: "m1", name: "Diffused-base method", level: 2, isMain: true, uses: 850, body: "The classical approach. Thermal diffusion drives the base dopant into the silicon at 1000–1200°C. Best for stability and reproducibility; used in essentially every fabrication facility 1960–1980.", helpfulUp: 640, helpfulDown: 18 },
          { id: "m2", name: "Epitaxial method", level: 3, isMain: false, uses: 410, body: "The base layer is grown epitaxially atop the collector substrate, allowing very precise control of base width and doping profile. Higher performance, but requires expensive crystal-growth equipment.", helpfulUp: 330, helpfulDown: 22 },

      {
        id: "g-nand",
        topicId: "elec-digital-gates", level: 3,
        title: "Build a NAND gate from BJTs",
        author: "otto", coAuthors: [],
        status: "PUBLISHED",
        thumbsUp: 188, thumbsDown: 4, prereqs: ["g-bjt","g-resistor"],
        publishedAt: Date.now() - 86400000 * 40,
        translations: ["es"],
        plainWords: "A **NAND gate** is a tiny piece that follows a simple rule: it gives an output of OFF only when both of its inputs are ON. Every other thing a computer can do can be built from these gates.",
        inShort: [
          "The universal logic gate — any Boolean function can be built from NANDs alone.",
          "2 transistors, 3 resistors, 5V supply.",
          "Truth table: 00→1, 01→1, 10→1, 11→0.",
          "Prerequisite: BJT lesson (Level 2)."
        ],
        body: `A **NAND gate** outputs LOW only when all inputs are HIGH. It is the universal gate: every other Boolean function can be constructed from NANDs alone, making it the simplest possible foundation for digital logic.\n\n## Materials\n\n- 2 BJTs (from the [[BJT lesson]])\n- 3 resistors (2× 10kΩ, 1× 1kΩ) (from the [[resistor lesson]])\n- 5V power supply\n\n## Construction\n\n1. Wire the two BJTs in series between Vcc and ground via the collector resistor.\n2. Connect input A to the first BJT's base via a 10kΩ resistor.\n3. Connect input B to the second BJT's base via a 10kΩ resistor.\n4. Take the output from between Vcc and the top BJT's collector.\n\n## Methods\n\nMETHODSTACK\n\n## See also\n\n- [[NOR gate]]\n- [[Universal gate]]`,
        layers: [],
        methods: [
          { id: "m1", name: "Resistor–transistor logic (RTL)", level: 2, isMain: true, uses: 320, body: "Simple, slow, historically the first integrated logic family.", helpfulUp: 260, helpfulDown: 14 },

        ],
        vendors: [
          { name: "Adafruit — 74HC00 quad NAND IC", rating: 4.8 }
        ]
      },
      {
        id: "g-alu",
        topicId: "elec-digital-cpu", level: 4,
        title: "Build a 4-bit ALU from NAND gates",
        author: "you", coAuthors: [],
        status: "IN_REVIEW",
        thumbsUp: 0, thumbsDown: 0, prereqs: ["g-nand"],
        submittedAt: Date.now() - 86400000 * 2,
        deadline: Date.now() + 86400000 * 5,
        translations: [],
        plainWords: "The math part of a computer is called an **ALU**. It can add, subtract, and do simple logic with two numbers. Every CPU has one inside.",
        inShort: [
          "Combine ~74 NAND gates into the arithmetic core of a CPU.",
          "Supports add, subtract, AND, OR over 4-bit operands.",
          "Prerequisite: the NAND-gate lesson (Level 3)."
        ],
        body: `An **Arithmetic Logic Unit (ALU)** combines logic gates to perform addition, subtraction, AND, OR, and XOR operations over 4-bit operands. It is the computational core of every classical CPU.\n\n## Materials\n\n- ~74 NAND gates (from the [[NAND lesson]])\n- Breadboard or PCB\n- Status LEDs\n\n## Construction\n\n1. Build four full adders by chaining NANDs into XOR, AND, and OR gates.\n2. Cascade the full adders using ripple-carry.\n3. Add a 2-bit mode selector.\n4. Test each operation against the truth tables.\n\n## Methods\n\nMETHODSTACK`,
        layers: [],
        methods: [
          { id: "m1", name: "Ripple-carry", level: 3, isMain: true, uses: 0, body: "Simplest construction. Cascade of full adders. Slow for wide operands but trivial to build.", helpfulUp: 0, helpfulDown: 0 },
          { id: "m2", name: "Carry-lookahead", level: 4, isMain: false, uses: 0, body: "Faster but uses many more gates. Better for ≥8 bit operands.", helpfulUp: 0, helpfulDown: 0 }
        ],
        vendors: []
      },
      {
        id: "g-mortise",
        topicId: "wood-joinery", level: 1,
        title: "How to make a mortise and tenon joint",
        author: "ana", coAuthors: [],
        status: "PUBLISHED",
        thumbsUp: 89, thumbsDown: 2, prereqs: [],
        publishedAt: Date.now() - 86400000 * 22,
        translations: [],
        plainWords: "A **mortise and tenon** is the oldest and strongest way to join two pieces of wood. One piece has a square hole (the mortise). The other has a square peg the same size (the tenon). They lock together like a puzzle.",
        inShort: [
          "The oldest woodworking joint, used since ancient Egypt.",
          "Mortise = the hole. Tenon = the matching peg.",
          "Hand-cut version takes 30–45 minutes.",
          "No prerequisites."
        ],
        body: `A **mortise and tenon** joint is a strong, traditional method of joining two pieces of wood at right angles. The mortise is a rectangular hole cut into one piece; the tenon is a matching projection cut on the other.\n\n## Materials\n\n- Two pieces of square-section wood (e.g. 40×40mm)\n- Marking gauge, pencil, square\n- A chisel (10–12mm wide)\n- A backsaw or tenon saw\n- A mallet\n\n## Methods\n\nMETHODSTACK\n\n## See also\n\n- [[Dovetail joint]]\n- [[Lap joint]]`,
        layers: [],
        methods: [
          { id: "m1", name: "Hand-cut (traditional)", level: 1, isMain: true, uses: 320, body: "Mark out, drill out most of the waste, finish with a sharp chisel. The mortise is cut first, then the tenon is shaped to fit.", helpfulUp: 240, helpfulDown: 18 },
          { id: "m2", name: "Router and jig", level: 2, isMain: false, uses: 180, body: "Use a plunge router with a mortise jig. Faster and more accurate but requires the right equipment.", helpfulUp: 140, helpfulDown: 26 }

function esc(s) { return (s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function ago(ts) {
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60) return "just now";
  if (d < 3600) return `${Math.floor(d/60)} min ago`;
  if (d < 86400) return `${Math.floor(d/3600)} h ago`;
  if (d < 86400*30) return `${Math.floor(d/86400)} d ago`;
  return `${Math.floor(d/86400/30)} mo ago`;
}
function until(ts) {
  const d = Math.floor((ts - Date.now()) / 1000);
  if (d < 0) return "expired";
  if (d < 3600) return `${Math.floor(d/60)} min`;
  if (d < 86400) return `${Math.floor(d/3600)} h`;
  return `${Math.floor(d/86400)} d`;
}
function getSubject(id) { return state.subjects.find(s => s.id === id); }
function getLesson(id) { return state.lessons.find(l => l.id === id); }
function subjectPath(id) {
  const path = []; let s = getSubject(id);
  while (s) { path.unshift(s); s = s.parentId ? getSubject(s.parentId) : null; }
  return path;
}
function subjectChildren(parentId) { return state.subjects.filter(s => s.parentId === parentId); }
function lessonsIn(rootId) {
  const ids = new Set([rootId]); let changed = true;
  while (changed) {
    changed = false;
    for (const s of state.subjects) {
      if (s.parentId && ids.has(s.parentId) && !ids.has(s.id)) { ids.add(s.id); changed = true; }
    }
  }
  return state.lessons.filter(l => ids.has(l.topicId));
}
function rootSubjects() { return state.subjects.filter(s => s.parentId === null); }
function levelName(l) { return ["", "Level 1", "Level 2", "Level 3", "Level 4"][l] || `Level ${l}`; }
function levelWho(l) { return ["", "Beginner", "School", "Hobbyist", "Specialist"][l] || ""; }

function status(s) { return `<span class="status ${s}">${s.replace(/_/g," ").toLowerCase()}</span>`; }
// Wilson score lower bound — proven ranking algorithm (Reddit, HN, etc.)
// Returns a number between 0 and 1 representing "given the votes, the conservative
// estimate of how good this thing actually is". Solves the "1/1 vs 200/20" problem.
function wilsonScore(up, down) {
  const n = up + down;
  if (n === 0) return 0;
  const z = 1.96; // 95% confidence
  const p = up / n;
  const denom = 1 + z*z/n;
  const center = p + z*z/(2*n);
  const margin = z * Math.sqrt((p*(1-p) + z*z/(4*n)) / n);
  return (center - margin) / denom;
}

// Track method votes per (user, lesson, method) in state
function ensureMethodVotes() {
  if (!state.methodVotes) state.methodVotes = {};
  if (!state.methodUsage) state.methodUsage = {};
}
function getMethodVote(lessonId, methodId) {
  ensureMethodVotes();
  return state.methodVotes[`${state.currentUser}|${lessonId}|${methodId}`];
}
function getMethodUsed(lessonId, methodId) {
  ensureMethodVotes();
  return state.methodUsage[`${state.currentUser}|${lessonId}|${methodId}`];
}

function voteMethod(lessonId, methodId, dir) {
  const u = state.users[state.currentUser];
  if (u.reputation < 10) { toast("Need 10+ reputation to rate methods."); return; }
  ensureMethodVotes();
  const l = getLesson(lessonId); if (!l) return;
  const m = l.methods.find(x => x.id === methodId); if (!m) return;
  const key = `${state.currentUser}|${lessonId}|${methodId}`;
  const prev = state.methodVotes[key];
  // Undo previous
  if (prev === 1) m.helpfulUp = Math.max(0, (m.helpfulUp||0) - 1);
  if (prev === -1) m.helpfulDown = Math.max(0, (m.helpfulDown||0) - 1);
  // Apply new (toggle off if same)
  if (prev === dir) {
    delete state.methodVotes[key];
    toast("Vote removed.");
  } else {
    if (dir === 1) m.helpfulUp = (m.helpfulUp||0) + 1;
    if (dir === -1) m.helpfulDown = (m.helpfulDown||0) + 1;
    state.methodVotes[key] = dir;
    toast(dir === 1 ? "Marked helpful." : "Marked unhelpful.");
  }
  save(); render();
}

function markMethodUsed(lessonId, methodId) {
  const u = state.users[state.currentUser];
  if (u.reputation < 20) { toast("Need 20+ reputation to claim usage (anti-spam)."); return; }
  ensureMethodVotes();

  const key = `${state.currentUser}|${lessonId}|${methodId}`;

  }
  save(); render();
}

// Tiny markdown
function md(src) {
  if (!src) return "";
  let s = esc(src);
  s = s.replace(/```([\s\S]*?)```/g, (_,c)=>`<pre>${c}</pre>`);
  s = s.replace(/^### (.*)$/gm, "<h3>$1</h3>");
  s = s.replace(/^## (.*)$/gm, "<h2>$1</h2>");
  s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\*(.+?)\*/g, "<em>$1</em>");
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  s = s.replace(/\[\[([^\]]+)\]\]/g, '<a>$1</a>');
  s = s.replace(/((?:^\|.*\|\n?)+)/gm, (block) => {
    const lines = block.trim().split("\n");
    if (lines.length < 2) return block;
    const rows = lines.map(l => l.trim().slice(1, -1).split("|").map(c => c.trim()));
    const header = rows[0]; const body = rows.slice(2);
    return `<table class="data"><thead><tr>${header.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  });
  s = s.replace(/((?:^- .+\n?)+)/gm, (block) => `<ul>${block.trim().split("\n").map(l => `<li>${l.replace(/^- /,"")}</li>`).join("")}</ul>`);
  s = s.replace(/((?:^\d+\. .+\n?)+)/gm, (block) => `<ol>${block.trim().split("\n").map(l => `<li>${l.replace(/^\d+\. /,"")}</li>`).join("")}</ol>`);
  s = s.split(/\n\n+/).map(p => /^<(h\d|ul|ol|pre|table)/.test(p) ? p : `<p>${p.replace(/\n/g,"<br>")}</p>`).join("\n");
  return s;
}

function renderSubjTree(parentId, activeId, depth=0) {
  const nodes = subjectChildren(parentId);
  if (!nodes.length) return "";
  // Auto-expand the active path: collect ids on the path
  const activePathIds = activeId ? new Set(subjectPath(activeId).map(p => p.id)) : new Set();
  return `<ul>${nodes.map(n => {
    const onPath = activePathIds.has(n.id);
    const isLeaf = subjectChildren(n.id).length === 0;
    const isActiveLeaf = n.id === activeId;
    const count = lessonsIn(n.id).length;
    const kids = renderSubjTree(n.id, activeId, depth+1);
    // Top-level always visible (depth 0); deeper only if on active path or collapsed=false
    // Use a CSS class "collapsed" that hides children
    const collapsed = !onPath && !isLeaf;  // default: only the active branch is open
    return `<li class="${collapsed?'collapsed':''}" data-subj-li="${n.id}">
      <div class="subj-row ${onPath?'active':''} ${isActiveLeaf?'active-leaf':''}" data-subj="${n.id}">
        <span class="caret ${isLeaf?'leaf':''} ${!collapsed && !isLeaf?'open':''}" data-caret="${n.id}">${isLeaf?'•':'▸'}</span>
        <span class="name">${depth===0 && n.emoji ? n.emoji + ' ' : ''}${esc(n.name)}</span>
        ${count ? `<span class="count">${count}</span>` : ""}
      </div>
      ${kids}
    </li>`;
  }).join("")}</ul>`;
}

// Toggle a node's collapsed state (called when caret/row is clicked)
function toggleSubjNode(id) {
  const li = document.querySelector(`[data-subj-li="${id}"]`);
  if (!li) return;
  const caret = li.querySelector(`[data-caret="${id}"]`);
  const wasCollapsed = li.classList.contains("collapsed");
  li.classList.toggle("collapsed");
  if (caret) caret.classList.toggle("open", wasCollapsed);
}

// Filter the tree by typed text — show only matching subjects and their ancestors
function filterSubjects(query) {
  const q = (query || "").toLowerCase().trim();
  const tree = document.getElementById("subj-tree");
  const empty = document.getElementById("subj-empty");
  if (!tree) return;
  const allLis = tree.querySelectorAll("[data-subj-li]");

  if (!q) {
    // Reset: re-render normally
    allLis.forEach(li => { li.classList.remove("hide"); });
    // Restore default collapsed state — only active branch open
    allLis.forEach(li => {
      const subjId = li.dataset.subjLi;
      const isLeaf = subjectChildren(subjId).length === 0;
      const activeId = (route.subjectId || (route.page==="lesson" && getLesson(route.lessonId)?.topicId));
      const onPath = activeId ? subjectPath(activeId).some(p=>p.id===subjId) : false;
      const shouldCollapse = !onPath && !isLeaf;
      li.classList.toggle("collapsed", shouldCollapse);
      const caret = li.querySelector(`[data-caret="${subjId}"]`);
      if (caret) caret.classList.toggle("open", !shouldCollapse && !isLeaf);
      // Remove any highlight marks
      const nameEl = li.querySelector(".name");
      if (nameEl && nameEl.querySelector("mark")) {
        nameEl.innerHTML = nameEl.textContent;
      }
    });
    empty.style.display = "none";
    return;
  }

  // Find matches
  const matches = new Set();
  state.subjects.forEach(s => {
    if (s.name.toLowerCase().includes(q)) {
      // Add the match and all its ancestors
      let cur = s;
      while (cur) {
        matches.add(cur.id);
        cur = cur.parentId ? getSubject(cur.parentId) : null;
      }
    }
  });

  let anyShown = false;
  allLis.forEach(li => {
    const id = li.dataset.subjLi;
    if (matches.has(id)) {
      li.classList.remove("hide", "collapsed");  // show and expand
      const caret = li.querySelector(`[data-caret="${id}"]`);
      if (caret && !caret.classList.contains("leaf")) caret.classList.add("open");
      anyShown = true;
      // Highlight matched text
      const subj = getSubject(id);
      const nameEl = li.querySelector(".name");
      if (nameEl && subj && subj.name.toLowerCase().includes(q)) {
        const idx = subj.name.toLowerCase().indexOf(q);
        const prefix = (li.querySelector(".name").textContent.startsWith(subj.emoji || "") && subj.emoji) ? subj.emoji + " " : "";
        nameEl.innerHTML = prefix + esc(subj.name.slice(0, idx)) + "<mark>" + esc(subj.name.slice(idx, idx+q.length)) + "</mark>" + esc(subj.name.slice(idx+q.length));
      }
    } else {
      li.classList.add("hide");
    }
  });
  empty.style.display = anyShown ? "none" : "block";
}
function attachSidebar() {
  document.querySelectorAll(".subj-tree [data-subj]").forEach(r => {
    r.onclick = (e) => {
      e.stopPropagation();
      // If they clicked the caret, just toggle expansion — don't navigate
      if (e.target.classList.contains("caret") && !e.target.classList.contains("leaf")) {
        toggleSubjNode(r.dataset.subj);
        return;
      }
      // Top-level subjects open the Portal page; sub-subjects go to the list browse
      const subj = getSubject(r.dataset.subj);
      if (subj && !subj.parentId) {
        go({page:"portal", subjectId: r.dataset.subj});
      } else {
        go({page:"subject", subjectId: r.dataset.subj});
      }
    };
  });
}
function randomLesson() {
  const ls = state.lessons.filter(l => l.status === "PUBLISHED");
  const l = ls[Math.floor(Math.random() * ls.length)];
  go({page:"lesson", lessonId: l.id});
}

function render() {
  document.getElementById("me-handle").textContent = state.currentUser;
  document.body.dataset.theme = state.theme || "light";
  document.querySelectorAll('#tabbar [data-nav]').forEach(t => {
    const map = {
      home: ["home"],
      browse: ["browse","subject"],
      write: ["write"],
      wishes: ["wishes"],
      disputes: ["disputes","dispute"],
      rfc: ["rfc","rfc-detail"],
      roles: ["roles","become-verifier"]
    };
    const active = (map[t.dataset.nav] || []).includes(route.page);
    t.classList.toggle("active", active);
    if (active) t.setAttribute("aria-current", "page"); else t.removeAttribute("aria-current");
  });
  closeDrawer();
  const app = document.getElementById("app");
  switch (route.page) {
    case "home":             app.innerHTML = renderHome(); break;
    case "browse":           app.innerHTML = renderBrowse(); break;
    case "subject":          app.innerHTML = renderBrowse(route.subjectId); break;
    case "portal":           app.innerHTML = renderPortal(route.subjectId); break;
    case "lesson":           app.innerHTML = renderLesson(route.lessonId); break;
    case "talk":             app.innerHTML = renderTalk(route.lessonId); break;
    case "write":            app.innerHTML = renderWrite(); attachWrite(); break;
    case "review":           app.innerHTML = renderReview(route.reviewId); attachReview(); break;
    case "become-verifier":  app.innerHTML = renderBecomeVerifier(); break;
    case "disputes":         app.innerHTML = renderDisputes(); break;
    case "dispute":          app.innerHTML = renderDispute(route.disputeId); break;
    case "wishes":           app.innerHTML = renderWishes(); break;
    case "rfc":              app.innerHTML = renderRFCs(); break;
    case "rfc-detail":       app.innerHTML = renderRFCDetail(route.rfcId); break;
    case "roles":            app.innerHTML = renderRoles(); break;
    case "profile":          app.innerHTML = renderProfile(route.handle); break;
    default:                 app.innerHTML = renderHome();
  }
  attachSidebar();
  window.scrollTo(0, 0);
}

function renderBrowse(subjectId) {
  // If a specific subject is requested, keep the old per-subject view
  if (subjectId) return renderBrowseSubject(subjectId);
  return renderLibrary();
}

function renderBrowseSubject(subjectId) {
  const s = getSubject(subjectId);

  list.forEach(l => { (byLevel[l.level] = byLevel[l.level] || []).push(l); });

          ${byLevel[L].map(l => `
            <div class="lesson-row" onclick='go({page:"lesson",lessonId:"${l.id}"})'>
              <span class="ltitle">${esc(l.title)}</span>
              <span class="lmeta">
                ${status(l.status)}
                <span>by <a onclick='event.stopPropagation();go({page:"profile",handle:"${l.author}"})'>@${l.author}</a></span>
