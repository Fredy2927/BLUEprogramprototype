    </div>
  `;
}

function renderLibrary() {
  // Compute filtered + sorted set
  const allRoots = rootSubjects();
  const allLessons = state.lessons;

  // 1. Apply filters
  let filtered = allLessons.slice();
  // status
  if (lib.status !== "ALL") filtered = filtered.filter(l => l.status === lib.status);
  // levels
  if (lib.levels.size) filtered = filtered.filter(l => lib.levels.has(l.level));
  // subjects (top-level — match if lesson's topic is in this branch)
  if (lib.subjects.size) {
    filtered = filtered.filter(l => {
      let cur = getSubject(l.topicId);
      while (cur) {
        if (lib.subjects.has(cur.id)) return true;
        cur = cur.parentId ? getSubject(cur.parentId) : null;
      }
      return false;
    });
  }
  // text search
  const q = lib.q.trim().toLowerCase();
  if (q) {
    filtered = filtered.filter(l =>
      l.title.toLowerCase().includes(q) ||
      (l.plainWords || "").toLowerCase().includes(q) ||
      (l.body || "").toLowerCase().includes(q)
    );
  }

  // 2. Apply sort
  if (lib.sort === "helpful")  filtered.sort((a,b) => (b.thumbsUp||0) - (a.thumbsUp||0));
  if (lib.sort === "newest")   filtered.sort((a,b) => (b.publishedAt || b.submittedAt || 0) - (a.publishedAt || a.submittedAt || 0));
  if (lib.sort === "alpha")    filtered.sort((a,b) => a.title.localeCompare(b.title));
  if (lib.sort === "level")    filtered.sort((a,b) => a.level - b.level || (b.thumbsUp||0) - (a.thumbsUp||0));

  // 3. Count helpers (for facet counts)
  const inSubject = (subjId, lessons) => lessons.filter(l => {
    let cur = getSubject(l.topicId);
    while (cur) { if (cur.id === subjId) return true; cur = cur.parentId ? getSubject(cur.parentId) : null; }
    return false;
  }).length;

  // 4. Active filter pills (for top of grid)
  const appliedPills = [];
  lib.subjects.forEach(id => {
    const sb = getSubject(id);
    if (sb) appliedPills.push(`<span class="lib-pill" onclick="libToggleSubject('${id}')">${sb.emoji || ""} ${esc(sb.name)} <span class="x">×</span></span>`);
  });
  lib.levels.forEach(L => appliedPills.push(`<span class="lib-pill" onclick="libToggleLevel(${L})">${levelName(L)} <span class="x">×</span></span>`));
  if (lib.status !== "PUBLISHED") appliedPills.push(`<span class="lib-pill" onclick="lib.status='PUBLISHED';render()">Status: ${lib.status.toLowerCase().replace("_"," ")} <span class="x">×</span></span>`);
  if (q) appliedPills.push(`<span class="lib-pill" onclick="lib.q='';render()">"${esc(q)}" <span class="x">×</span></span>`);

  return `
    <div class="layout">
      <aside class="sidebar">${renderSidebar()}</aside>
      <main id="main" class="article" tabindex="-1">

        <h1 class="firstHeading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;font-weight:700;">All lessons</h1>
        <p class="subtitle">${allLessons.length} lessons across ${state.subjects.length} subjects. Filter, sort, or just browse.</p>

        <div class="lib-controls">
          <div class="lib-search">
            <input type="text" id="lib-q" placeholder="Search titles and content…" value="${esc(lib.q)}" oninput="libSetQuery(this.value)" />
          </div>
          <div class="lib-sort">
            <label for="lib-sort-sel" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600">Sort by</label>
            <select id="lib-sort-sel" onchange="lib.sort=this.value;render()">
              <option value="helpful" ${lib.sort==="helpful"?"selected":""}>Most helpful</option>
              <option value="newest"  ${lib.sort==="newest"?"selected":""}>Newest</option>
              <option value="alpha"   ${lib.sort==="alpha"?"selected":""}>A → Z</option>
              <option value="level"   ${lib.sort==="level"?"selected":""}>Difficulty</option>
            </select>
          </div>
        </div>

        <div class="lib-facets">
          <div class="lib-facet-group">
            <span class="lib-facet-label">Subject:</span>
            ${allRoots.map(r => {
              const count = inSubject(r.id, allLessons);
              const sel = lib.subjects.has(r.id);
              return `<span class="lib-chip ${sel?'sel':''}" onclick="libToggleSubject('${r.id}')">${r.emoji||""} ${esc(r.name)} <span class="ct">${count}</span></span>`;
            }).join("")}
          </div>
        </div>

        <div class="lib-facets">
          <div class="lib-facet-group">
            <span class="lib-facet-label">Difficulty:</span>
            ${[1,2,3,4].map(L => {
              const count = allLessons.filter(x => x.level === L).length;
              const sel = lib.levels.has(L);
              return `<span class="lib-chip ${sel?'sel':''}" onclick="libToggleLevel(${L})">${levelName(L)} <span class="ct">${count}</span></span>`;
            }).join("")}
          </div>
          <div class="lib-facet-group">
            <span class="lib-facet-label">Status:</span>
            ${["PUBLISHED","IN_REVIEW","ALL"].map(st => {
              const count = st === "ALL" ? allLessons.length : allLessons.filter(x => x.status === st).length;
              const sel = lib.status === st;
              const label = st === "ALL" ? "All" : st.toLowerCase().replace("_"," ");
              return `<span class="lib-chip ${sel?'sel':''}" onclick="lib.status='${st}';render()">${label} <span class="ct">${count}</span></span>`;
            }).join("")}
          </div>
        </div>

        ${appliedPills.length ? `
          <div class="lib-applied">
            <span>Filters:</span>
            ${appliedPills.join("")}
            <span class="lib-clear" onclick="libClear()">Clear all</span>
          </div>
        ` : ""}

        <div class="lib-summary">
          <span><strong>${filtered.length}</strong> of ${allLessons.length} lesson${allLessons.length===1?"":"s"}</span>
        </div>

        ${filtered.length === 0 ? `
          <div class="lib-empty">
            <h3>No lessons match these filters</h3>
            <p>Try removing a filter, or write the first lesson that matches.</p>
            <button class="btn" onclick="libClear()">Reset filters</button>
            <button class="btn primary" onclick="go({page:'write'})">Write a lesson</button>
          </div>
        ` : `
          <div class="lib-grid">
            ${filtered.map(l => {
              const sub = getSubject(l.topicId);
              const blurb = (l.plainWords || l.body || "").replace(/[*#`\[\]]/g, "").trim().slice(0, 180);
              return `
                <div class="lib-card" onclick='go({page:"lesson",lessonId:"${l.id}"})'>
                  <div class="lc-head">
                    ${levelTag(l.level)}
                    ${status(l.status)}
                    ${sub ? `<span class="small">in ${esc(sub.name)}</span>` : ""}
                  </div>
                  <div class="lc-title">${esc(l.title)}</div>
                  ${blurb ? `<div class="lc-blurb">${esc(blurb)}…</div>` : ""}
                  ${l.prereqs && l.prereqs.length ? `<div class="lc-prereq"><span class="ico">📚</span>Needs: ${l.prereqs.map(p => { const pg = getLesson(p); return pg ? esc(pg.title) : ""; }).join(", ")}</div>` : ""}
                  <div class="lc-meta">
                    <span>by <span class="author" onclick='event.stopPropagation();go({page:"profile",handle:"${l.author}"})'>@${l.author}</span></span>
                    ${l.publishedAt ? `<span>${ago(l.publishedAt)}</span>` : `<span>in review</span>`}
                    ${l.thumbsUp ? `<span>▲ ${l.thumbsUp}</span>` : ""}
                    ${l.methods && l.methods.length > 1 ? `<span>${l.methods.length} methods</span>` : ""}
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `}

      </main>
    </div>
  `;
}

// Filter handlers — keep DOM input focus where possible
function libSetQuery(v) {
  lib.q = v;
  // Re-render but restore input focus + cursor
  const wasFocus = document.activeElement?.id === "lib-q";
  const cursorPos = wasFocus ? document.activeElement.selectionStart : null;
  render();
  if (wasFocus) {
    const el = document.getElementById("lib-q");
    if (el) { el.focus(); if (cursorPos !== null) el.setSelectionRange(cursorPos, cursorPos); }
  }
}
function libToggleSubject(id) {
  if (lib.subjects.has(id)) lib.subjects.delete(id); else lib.subjects.add(id);
  render();
}
function libToggleLevel(L) {
  if (lib.levels.has(L)) lib.levels.delete(L); else lib.levels.add(L);
  render();
}
function libClear() {
  lib.q = ""; lib.subjects.clear(); lib.levels.clear(); lib.status = "PUBLISHED"; lib.sort = "helpful";
  render();
}


/* ---------------- PORTAL (Wikipedia-style subject landing page) ---------------- */
function renderPortal(subjectId) {
  const s = getSubject(subjectId);
  if (!s) return `<div class="layout single"><main class="article"><div class="notice warn"><span class="ico">⚠</span><div>Subject not found.</div></div></main></div>`;
  const all = lessonsIn(subjectId);
  const published = all.filter(l => l.status === "PUBLISHED");
  const inReview = all.filter(l => l.status === "IN_REVIEW");
  const byLevel = { 1: [], 2: [], 3: [], 4: [] };
  published.forEach(l => byLevel[l.level]?.push(l));
  // Featured = top-helpful published lesson
  const featured = published.slice().sort((a,b) => (b.thumbsUp||0) - (a.thumbsUp||0))[0];
  // Subportals = direct children of this subject
  const subportals = subjectChildren(subjectId);
  // Wishes in this subject branch
  const subjectIds = new Set();
  (function collect(id) { subjectIds.add(id); subjectChildren(id).forEach(c => collect(c.id)); })(subjectId);
  const wishes = (state.wishes || []).filter(w => subjectIds.has(w.topicId) && w.status !== "RESOLVED");
  // Top contributors = authors in this branch sorted by lesson count
  const authorCounts = {};
  published.forEach(l => { authorCounts[l.author] = (authorCounts[l.author]||0) + 1; (l.coAuthors||[]).forEach(c => { authorCounts[c] = (authorCounts[c]||0)+1; }); });
  const topAuthors = Object.entries(authorCounts).sort((a,b) => b[1]-a[1]).slice(0, 5);

  return `
    <div class="layout">
      <aside class="sidebar">${renderSidebar(subjectId)}</aside>
      <main id="main" class="article" tabindex="-1">

        <div class="hatnote"><a onclick="go({page:'browse'})">All subjects</a> ${subjectPath(s.id).slice(0,-1).map(p => `› <a onclick="go({page:'portal',subjectId:'${p.id}'})">${esc(p.name)}</a>`).join(" ")} › <strong>${esc(s.name)}</strong> portal</div>

        <h1 class="firstHeading" style="font-family:'Linux Libertine','Georgia','Times New Roman',serif !important;font-weight:400 !important;">${s.emoji ? s.emoji + " " : ""}Portal: ${esc(s.name)}</h1>
        <p class="subtitle">${esc(s.blurb || "A curated entrance to lessons on this subject.")} &nbsp;·&nbsp; ${all.length} lessons &nbsp;·&nbsp; <a onclick="go({page:'subject',subjectId:'${s.id}'})">View all as a list →</a></p>

        <div class="portal-grid">
          <div class="portal-col-main">

            ${featured ? `
              <section class="portal-box">
                <h3 class="portal-h" style="font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-weight:700;">Featured lesson</h3>
                <div class="portal-featured" onclick='go({page:"lesson",lessonId:"${featured.id}"})'>
                  <div class="portal-featured-title">${esc(featured.title)}</div>
                  <div class="small" style="margin:6px 0">${levelTag(featured.level)} ${levelName(featured.level)} · by @${featured.author} · ${featured.thumbsUp||0} found helpful</div>
                  <div class="portal-featured-blurb">${esc(((featured.plainWords||"").slice(0,260)).replace(/\*\*/g,""))}…</div>
                  <a class="small">Read full lesson →</a>
                </div>
              </section>
            ` : ""}

            <section class="portal-box">
              <h3 class="portal-h" style="font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-weight:700;">Lessons by level</h3>
              ${[1,2,3,4].filter(L => byLevel[L].length).map(L => `
                <div class="portal-level">
                  <div class="portal-level-head">${levelTag(L)} ${levelName(L)} <span class="small">— ${levelWho(L)}</span></div>
                  <ul class="portal-level-list">
                    ${byLevel[L].slice(0,6).map(l => `<li><a onclick='go({page:"lesson",lessonId:"${l.id}"})'>${esc(l.title)}</a> <span class="small">· by @${l.author}</span></li>`).join("")}
                    ${byLevel[L].length > 6 ? `<li class="small"><a onclick="go({page:'subject',subjectId:'${s.id}'})">+ ${byLevel[L].length - 6} more →</a></li>` : ""}
                  </ul>
                </div>
              `).join("") || '<p class="small">No published lessons here yet. <a onclick="go({page:\'write\'})">Write the first one</a>.</p>'}
            </section>

            ${subportals.length ? `
              <section class="portal-box">
                <h3 class="portal-h" style="font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-weight:700;">Sub-topics</h3>
                <ul class="portal-subportals">
                  ${subportals.map(sub => {
                    const c = lessonsIn(sub.id).length;
                    return `<li><a onclick='go({page:"portal",subjectId:"${sub.id}"})'>${esc(sub.name)}</a> <span class="small">(${c})</span></li>`;
                  }).join("")}
                </ul>
              </section>
            ` : ""}

          </div>

          <div class="portal-col-side">

            <section class="portal-box portal-stats">
              <table>
                <tr><th>Lessons</th><td>${all.length}</td></tr>
                <tr><th>Published</th><td>${published.length}</td></tr>
                <tr><th>In review</th><td>${inReview.length}</td></tr>
                <tr><th>Sub-topics</th><td>${subportals.length}</td></tr>
                <tr><th>Open wishes</th><td>${wishes.length}</td></tr>
              </table>
            </section>

            ${inReview.length ? `
              <section class="portal-box">
                <h3 class="portal-h-side">In review</h3>
                <ul class="portal-mini-list">
                  ${inReview.slice(0,4).map(l => `<li><a onclick='go({page:"lesson",lessonId:"${l.id}"})'>${esc(l.title)}</a><br><span class="small">${levelTag(l.level)} · ${until(l.deadline)} left</span></li>`).join("")}
                </ul>
              </section>
            ` : ""}

            ${wishes.length ? `
              <section class="portal-box">
                <h3 class="portal-h-side">Most-wished</h3>
                <ul class="portal-mini-list">
                  ${wishes.slice(0,3).map(w => `<li><a onclick='go({page:"wishes"})'>${esc(w.title)}</a><br><span class="small">${w.pointsPledged}/${w.pointsGoal} points</span></li>`).join("")}
                </ul>
              </section>
            ` : ""}

            ${topAuthors.length ? `
              <section class="portal-box">
                <h3 class="portal-h-side">Top contributors</h3>
                <ul class="portal-mini-list">
                  ${topAuthors.map(([h, n]) => `<li><a onclick='go({page:"profile",handle:"${h}"})'>@${h}</a> <span class="small">— ${n} lesson${n===1?"":"s"}</span></li>`).join("")}
                </ul>
              </section>
            ` : ""}

            <section class="portal-box">
              <h3 class="portal-h-side">Take part</h3>
              <ul class="portal-mini-list">
                <li><a onclick='go({page:"write"})'>+ Write a lesson here</a></li>
                <li><a onclick='go({page:"become-verifier"})'>+ Become a verifier</a></li>
                <li><a onclick='go({page:"wishes"})'>+ Open a lesson wish</a></li>
              </ul>
            </section>

          </div>
        </div>

        <div class="categories">
          <span class="categories-label">Categories:</span>
          ${subjectPath(s.id).map(p => p.id === s.id ? `<strong>${esc(p.name)}</strong>` : `<a onclick='go({page:"portal",subjectId:"${p.id}"})'>${esc(p.name)}</a>`).join("")}
        </div>

      </main>
    </div>
  `;
}

/* ---------------- LESSON ---------------- */
function renderLesson(lessonId) {
  const l = getLesson(lessonId);
  if (!l) return `<div class="layout single"><main class="article"><div class="notice warn"><span class="ico">⚠</span><div>Lesson not found.</div></div></main></div>`;
  const s = getSubject(l.topicId);
  const review = state.reviews.find(r => r.lessonId === l.id && r.status === "OPEN");
  const main = l.methods.find(m => m.isMain);
  const others = l.methods.filter(m => !m.isMain);
  const topOther = others.sort((a,b)=>b.uses-a.uses)[0];
  const shouldPromote = topOther && main && topOther.uses > main.uses * 1.05;

  // Build body with layer-stack / method-stack / color-table tokens replaced
  let body = md(l.body);

  // Inject layer stack
  if (l.layers && l.layers.length) {
    const layerHtml = `<div class="layer-stack">${l.layers.map(L => `
      <div class="layer lev-${L.level}">
        <div class="layer-tag">
          <span class="lev">${levelName(L.level)}</span>
          <span class="who">${L.who}</span>
          <span class="time">read: ${L.time}</span>
        </div>
        <div class="layer-body">${md(L.body)}</div>
      </div>`).join("")}</div>`;
    body = body.replace(/<p>LAYERSTACK<\/p>/, layerHtml);
  } else {
    body = body.replace(/<p>LAYERSTACK<\/p>/, "");
  }

  // Inject method stack — collapsible <details>, sorted by Wilson score
  // (canonical first, then by quality+adoption signal)
  const sortedMethods = [...l.methods].sort((a, b) => {
    if (a.isMain && !b.isMain) return -1;
    if (b.isMain && !a.isMain) return 1;
    return wilsonScore(b.helpfulUp||0, b.helpfulDown||0) - wilsonScore(a.helpfulUp||0, a.helpfulDown||0);
  });
  const methodHtml = `<div class="methods-section">
    <div class="methods-toolbar">
      <span style="color:var(--muted);margin-right:auto;font-size:11px">Sorted by canonical, then by helpful rating</span>
      <a onclick="document.querySelectorAll('.methods-section details.method').forEach(d=>d.open=true)">Expand all</a>
      <span style="color:var(--muted)">·</span>
      <a onclick="document.querySelectorAll('.methods-section details.method').forEach(d=>d.open=false)">Collapse all</a>
    </div>
    ${sortedMethods.map(m => {
      const up = m.helpfulUp||0, down = m.helpfulDown||0;
      const total = up + down;
      const pct = total > 0 ? Math.round(up / total * 100) : null;
      const ws = wilsonScore(up, down);
      const myVote = getMethodVote(l.id, m.id);
      const used = getMethodUsed(l.id, m.id);
      return `
      <details class="method ${m.isMain?'main':''}" ${m.isMain?'open':''}>
        <summary>
          <span class="m-name">${esc(m.name)}</span>
          ${m.isMain?'<span class="main-badge">Canonical</span>':''}
          <span class="m-meta">
            ${levelTag(m.level)}
            ${pct !== null ? `<span class="m-stars" title="${up} helpful, ${down} not helpful (Wilson score: ${ws.toFixed(2)})">★ ${pct}%</span>` : `<span class="m-stars muted">no ratings yet</span>`}
            <span class="m-uses" title="People who marked they used this method">${m.uses.toLocaleString()} use${m.uses===1?"":"s"}</span>
          </span>
        </summary>
        <div class="m-body">
          ${md(m.body)}
          <div class="m-rate">
            <span class="m-rate-label">Rate</span>
            <button class="m-rate-btn ${myVote===1?'sel up':''}" onclick="voteMethod('${l.id}','${m.id}',1)" title="Helpful">👍<span class="count">${up}</span></button>
            <button class="m-rate-btn ${myVote===-1?'sel down':''}" onclick="voteMethod('${l.id}','${m.id}',-1)" title="Not helpful">👎<span class="count">${down}</span></button>
            <span class="m-rate-sep">·</span>
            <button class="m-rate-btn ${used?'sel used':''}" onclick="markMethodUsed('${l.id}','${m.id}')" title="I tried this method myself">${used?'✓ Tried this':'+ I tried this'}</button>
            <span class="m-rate-info" title="Voting needs 10+ reputation. 'I tried this' needs 20+ to limit spam. Methods are ranked using a Wilson confidence score, so a high-rated new method with few votes won't outrank an established one.">ⓘ</span>
          </div>
        </div>
      </details>`;
    }).join("")}
  </div>`;
  body = body.replace(/<p>METHODSTACK<\/p>/g, methodHtml);

  // Inject color table (only on resistor lesson)
  if (l.id === "g-resistor") {
    const colorTable = `<table class="data">
      <thead><tr><th>Colour</th><th>Digit</th><th>Multiplier</th><th>Tolerance</th></tr></thead>
      <tbody>
        <tr><td>Black</td><td>0</td><td>×1</td><td>—</td></tr>
        <tr><td>Brown</td><td>1</td><td>×10</td><td>±1%</td></tr>
        <tr><td>Red</td><td>2</td><td>×100</td><td>±2%</td></tr>
        <tr><td>Orange</td><td>3</td><td>×1k</td><td>—</td></tr>
        <tr><td>Yellow</td><td>4</td><td>×10k</td><td>—</td></tr>
        <tr><td>Green</td><td>5</td><td>×100k</td><td>±0.5%</td></tr>
        <tr><td>Blue</td><td>6</td><td>×1M</td><td>±0.25%</td></tr>
        <tr><td>Violet</td><td>7</td><td>×10M</td><td>±0.1%</td></tr>
        <tr><td>Gold</td><td>—</td><td>×0.1</td><td>±5%</td></tr>
        <tr><td>Silver</td><td>—</td><td>×0.01</td><td>±10%</td></tr>
      </tbody>
    </table>`;
    body = body.replace(/<p>COLORTABLE<\/p>/g, colorTable);
  }

  return `
    <div class="layout">
      <aside class="sidebar">${renderSidebar(l.topicId)}</aside>
      <main id="main" class="article" tabindex="-1">

        <div class="hatnote">${subjectPath(l.topicId).map(p => `<a onclick='go({page:"subject",subjectId:"${p.id}"})'>${esc(p.name)}</a>`).join(" › ")}</div>

        <h1 class="firstHeading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;font-weight:700;">${esc(l.title)}</h1>
        <p class="subtitle">From B.L.U.E. · ${levelName(l.level)} lesson in ${esc(s.name)} · ${readingTime(l.body)} min read · ${l.thumbsUp || 0} found helpful</p>

        ${review ? `
          <div class="notice tip">
            <span class="ico">⚐</span>
            <div>
              <strong>This lesson is being checked by a verifier jury.</strong>
              ${review.votes.length} of ${review.jury.length} votes cast · deadline in ${until(review.deadline)}.
              ${canCheck(state.currentUser, l) ? ` <a onclick='go({page:"review",reviewId:"${review.id}"})'>Cast your vote →</a>` : ""}
            </div>
          </div>
        ` : ""}

        ${l.prereqs.length > 0 ? `
          <div class="notice">
            <span class="ico">📚</span>
            <div>
              <strong>Before this lesson, read:</strong>
              ${l.prereqs.map(pid => { const p = getLesson(pid); return p ? `<a onclick='go({page:"lesson",lessonId:"${p.id}"})'>${levelTag(p.level)}${esc(p.title)}</a>` : ""; }).join(" &nbsp; ")}
            </div>
          </div>
        ` : `<div class="hatnote">This is a Level 1 lesson. No prior knowledge is assumed.</div>`}

        <div class="infobox">
          <div class="infobox-title">${esc(l.title.split(/[—(]/)[0].trim())}</div>
          <table>
            <tr><th>Subject</th><td><a onclick='go({page:"subject",subjectId:"${s.id}"})'>${esc(s.name)}</a></td></tr>
            <tr><th>Difficulty</th><td>${levelTag(l.level)} ${levelName(l.level)}</td></tr>
            <tr><th>Status</th><td>${status(l.status)}</td></tr>
            <tr><th>Author${(l.coAuthors||[]).length?'s':''}</th><td>
              <a onclick='go({page:"profile",handle:"${l.author}"})'>@${l.author}</a>${(l.coAuthors||[]).length ? ", " + l.coAuthors.map(c => `<a onclick='go({page:"profile",handle:"${c}"})'>@${c}</a>`).join(", ") : ""}
            </td></tr>
            <tr><th>${l.publishedAt ? "Published" : "Submitted"}</th><td>${ago(l.publishedAt || l.submittedAt)}</td></tr>
            <tr><th>Helpful votes</th><td>▲ ${l.thumbsUp} &nbsp; ▼ ${l.thumbsDown}</td></tr>
            <tr><th>Methods</th><td>${l.methods.length} (${main ? esc(main.name) : "n/a"} is canonical)</td></tr>
            ${l.prereqs.length ? `<tr><th>Prerequisites</th><td>${l.prereqs.map(p => { const pg = getLesson(p); return pg ? `<a onclick='go({page:"lesson",lessonId:"${pg.id}"})'>${esc(pg.title)}</a>` : ""; }).join("<br>")}</td></tr>` : ""}
            ${(l.translations||[]).length ? `<tr><th>Languages</th><td>${l.translations.join(", ")}</td></tr>` : ""}
            <tr><th>License</th><td>CC BY-SA 4.0</td></tr>
          </table>
          <div class="ib-actions">
            <a onclick="thanksLesson('${l.id}')">💚 Say thanks (+1 to authors)</a>
            <a onclick="thumbsLesson('${l.id}', 1)">▲ Found this helpful</a>
            <a onclick="thumbsLesson('${l.id}', -1)">▼ Not helpful</a>
            <a onclick='go({page:"talk",lessonId:"${l.id}"})'>💬 Talk page (${(state.talkPosts[l.id]||[]).length})</a>
            <a onclick="openDispute('${l.id}')">⚠ Open a dispute</a>
          </div>
        </div>

        ${l.plainWords ? `
          <div class="plain">
            <div class="lbl">📘 In plain words</div>
            ${md(l.plainWords)}
          </div>
        ` : ""}

        ${l.inShort && l.inShort.length ? `
          <div class="in-short">
            <div class="lbl">⚡ In short</div>
            <ul>${l.inShort.map(i => `<li>${md(i).replace(/^<p>|<\/p>$/g,'')}</li>`).join("")}</ul>
          </div>
        ` : ""}

        ${shouldPromote ? `
          <div class="notice tip">
            <span class="ico">⚐</span>
            <div>The <strong>${esc(topOther.name)}</strong> method now has more usage than the canonical method. <a onclick="toast('A promotion vote would be opened here. (Demo)')">Open a promotion vote</a>.</div>
          </div>
        ` : ""}

        <div>${body}</div>

        ${l.vendors && l.vendors.length ? `
          <h2>Materials & tools for this build</h2>
          <p class="small">Ranked by community rating. B.L.U.E. may earn a small commission, which funds hosting. No banner ads, no popups.</p>
          <ol>${l.vendors.sort((a,b)=>b.rating-a.rating).map(v => `
            <li><strong>${esc(v.name)}</strong> — <span style="color:#d97706">${"★".repeat(Math.round(v.rating))}${"☆".repeat(5-Math.round(v.rating))}</span> <span class="small">${v.rating.toFixed(1)}</span></li>
          `).join("")}</ol>
        ` : ""}

        <h2>References</h2>
        <ol class="small">
          <li>Author: <a onclick='go({page:"profile",handle:"${l.author}"})'>@${l.author}</a>${(l.coAuthors||[]).length ? " with co-authors " + l.coAuthors.map(c => `<a onclick='go({page:"profile",handle:"${c}"})'>@${c}</a>`).join(", ") : ""}. Submitted ${new Date(l.publishedAt || l.submittedAt).toISOString().slice(0,10)}.</li>
          <li>Reviewed by a verifier jury under B.L.U.E. policy BVP:Review.</li>
          ${l.prereqs.map(p => { const pg = getLesson(p); return pg ? `<li>Prerequisite: <a onclick='go({page:"lesson",lessonId:"${pg.id}"})'>${esc(pg.title)}</a></li>` : ""; }).join("")}
        </ol>

        <div class="categories">
          <span class="categories-label">Categories:</span>
          ${subjectPath(l.topicId).map(p => `<a onclick='go({page:"subject",subjectId:"${p.id}"})'>${esc(p.name)}</a>`).join("")}
          <a>${levelName(l.level)} lessons</a>
        </div>

      </main>
    </div>
  `;
}

function thumbsLesson(id, dir) {
  const l = getLesson(id); if (!l) return;
  if (dir === 1) { l.thumbsUp++; toast("Thanks for the vote."); }
  else { l.thumbsDown++; toast("Noted."); }
  save(); render();
}
function thanksLesson(id) {
  const l = getLesson(id); if (!l) return;
  if (state.users[l.author]) state.users[l.author].reputation += 1;
  (l.coAuthors || []).forEach(c => { if (state.users[c]) state.users[c].reputation += 1; });
  l.thumbsUp = (l.thumbsUp || 0) + 1;
  save();
  toast(`Thanks sent. @${l.author} +1 reputation.`);
  render();
}
function openDispute(lid) {
  const types = ["CONTENT_ACCURACY","HIERARCHY_PLACEMENT","VERIFIER_CONDUCT","TAXONOMY"];
  const t = prompt("Dispute type:\n  1 — Something is wrong (accuracy)\n  2 — Wrong difficulty level\n  3 — A verifier behaved badly\n  4 — Subject taxonomy proposal\n\nEnter 1, 2, 3, or 4:", "1");
  if (!t) return;
  const body = prompt("Describe the problem (at least 20 characters):");
  if (!body || body.length < 20) { toast("Body too short."); return; }
  state.disputes.unshift({
    id: "d-" + Date.now(), openerId: state.currentUser,
    lessonId: lid, type: types[(+t)-1] || "CONTENT_ACCURACY",
    body, status: "OPEN", openedAt: Date.now()
  });
  save(); toast("Dispute opened.");
  go({page:"disputes"});
}

/* ---------------- TALK PAGE ---------------- */
function renderTalk(lessonId) {
  const l = getLesson(lessonId);
  if (!l) return `<div class="layout single"><main class="article"><div class="notice warn"><span class="ico">⚠</span><div>Lesson not found.</div></div></main></div>`;
  const posts = state.talkPosts[lessonId] || [];
  const topLevel = posts.filter(p => !p.parentId);
  const renderThread = (p) => {
    const replies = posts.filter(r => r.parentId === p.id);
    return `
      <div class="talk-post">
        <div class="ph"><span class="author">@${p.author}</span> · ${ago(p.at)}</div>
        <div class="pb">${esc(p.body)}</div>
      </div>
      ${replies.map(r => `<div class="talk-reply">${renderThread(r)}</div>`).join("")}
    `;
  };

  return `
    <div class="layout">
      <aside class="sidebar">${renderSidebar(l.topicId)}</aside>
      <main id="main" class="article" tabindex="-1">
        <div class="hatnote"><a onclick='go({page:"lesson",lessonId:"${l.id}"})'>← Back to the lesson</a></div>
        <h1 class="firstHeading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;font-weight:700;">Talk: ${esc(l.title)}</h1>
        <p class="subtitle">Discussion page for editors. ${posts.length} post${posts.length===1?"":"s"}.</p>

        <div class="notice">
          <span class="ico">💡</span>
          <div>Use the talk page to suggest changes <em>before</em> editing the lesson. This is where editorial debate happens. Add a new topic for each separate issue.</div>
        </div>

        <div class="actions-row" style="justify-content:flex-start;margin-bottom:14px">
          <button class="btn primary" onclick="newTalkPost('${l.id}')">+ Start a new topic</button>
        </div>

        ${topLevel.length === 0 ? `<div class="empty"><h3>No discussion yet</h3><p>Be the first to post.</p></div>` : topLevel.map(renderThread).join("")}
      </main>
    </div>
  `;
}
function newTalkPost(lid) {
  const body = prompt("What's your topic? (at least 20 characters)");
  if (!body || body.length < 20) { toast("Too short."); return; }
  if (!state.talkPosts[lid]) state.talkPosts[lid] = [];
  state.talkPosts[lid].unshift({
    id: "t-" + Date.now(), author: state.currentUser, at: Date.now(),
    parentId: null, body
  });
  save(); toast("Topic posted."); render();
}

/* ---------------- WRITE LESSON ---------------- */
let writeState = null;
function renderWrite() {
  if (!writeState) {
    writeState = {
      step: 1,
      topicId: "elec-components", level: 1,
      prereqs: [], coAuthors: [],
      title: "", plainWords: "", body: "## What you need\n\n- \n\n## How to do it\n\n1. \n",
      methods: [{name: "Default method", level: 1, isMain: true, body: "Describe the canonical way."}],
      licenseOk: false
    };
  }
  const ws = writeState;
  const candidates = state.lessons.filter(l => l.status === "PUBLISHED" && l.level < ws.level);
  const matchingWishes = state.wishes.filter(w => w.status === "OPEN" && (w.topicId === ws.topicId || subjectPath(ws.topicId).some(p => p.id === w.topicId)) && w.forLevel === ws.level);

  return `
    <div class="layout single">
      <main id="main" class="article" tabindex="-1">
        <h1 class="firstHeading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;font-weight:700;">Contribute a lesson</h1>
        <p class="subtitle">All contributions are released under CC BY-SA 4.0 and reviewed by a verifier jury before publication.</p>

        <div class="steps">
          ${["Subject & level","Title & summary","Body","Methods","License & submit"].map((s,i) => `
            <div class="step ${ws.step===i+1?'active':''} ${ws.step>i+1?'done':''}">
              <span class="n">${ws.step>i+1?'✓':i+1}</span>${s}
            </div>
          `).join("")}
        </div>

        ${ws.step === 1 ? `
          <div class="form-row">
            <label>Subject</label>
            <select id="w-subject">
              ${state.subjects.map(s => `<option value="${s.id}" ${s.id===ws.topicId?'selected':''}>${"— ".repeat(subjectPath(s.id).length-1)}${esc(s.name)}</option>`).join("")}
            </select>
          </div>
          <div class="form-row">
            <label>Difficulty</label>
            <div class="pick-list">
              ${[1,2,3,4].map(L => `<div class="pick ${ws.level===L?'sel':''}" onclick="writeState.level=${L};writeState.prereqs=[];render()">${levelName(L)} — ${levelWho(L)}</div>`).join("")}
            </div>
            <div class="form-hint">Level 1 = atomic skills with no prerequisites. Each higher level builds on lower-level lessons.</div>
          </div>

          ${matchingWishes.length ? `
            <div class="notice tip">
              <span class="ico">⭐</span>
              <div>
                <strong>This could claim a bounty.</strong>
                <ul style="margin:6px 0 0">${matchingWishes.map(w => `<li>${esc(w.title)} — ${w.pointsPledged}/${w.pointsGoal} points pledged</li>`).join("")}</ul>
                Whoever's lesson satisfies the wish gets a 20% reputation bonus.
              </div>
            </div>
          ` : ""}

          ${ws.level > 1 ? `
            <div class="form-row">
              <label>Prerequisites (lower-level published lessons)</label>
              ${candidates.length === 0 ? `
                <div class="notice warn"><span class="ico">⚠</span><div>No published lessons below Level ${ws.level} yet. Either lower the level or write a prerequisite first.</div></div>
              ` : `<div class="pick-list">
                ${candidates.map(l => `<div class="pick ${ws.prereqs.includes(l.id)?'sel':''}" onclick="togglePrereq('${l.id}')">${levelTag(l.level)}${esc(l.title)}</div>`).join("")}
              </div>`}
            </div>
          ` : `<div class="notice"><span class="ico">ℹ</span><div>Level 1 lessons need no prerequisites by definition.</div></div>`}

          <div class="actions-row">
            <button class="btn primary" onclick="writeNext()">Next →</button>
          </div>
        ` : ws.step === 2 ? `
          <div class="form-row">
            <label>Title</label>
            <input id="w-title" value="${esc(ws.title)}" placeholder="e.g. How to make a resistor" oninput="writeState.title=this.value" />
            <div class="form-hint">Start with "How to…" or "Build a…".</div>
          </div>
          <div class="form-row">
            <label>Plain-words summary (optional but recommended)</label>
            <textarea id="w-plain" oninput="writeState.plainWords=this.value" placeholder="Explain what this lesson is in 2–3 sentences, as if to someone who has never heard of the topic.">${esc(ws.plainWords)}</textarea>
            <div class="form-hint">This goes in the blue "In plain words" box at the top of your lesson.</div>
          </div>
          <div class="form-row">
            <label>Co-authors (optional)</label>
            <div class="pick-list">
              ${Object.values(state.users).filter(u => u.handle !== state.currentUser).map(u => `<div class="pick ${ws.coAuthors.includes(u.handle)?'sel':''}" onclick="toggleCoAuthor('${u.handle}')">@${u.handle}</div>`).join("")}
            </div>
          </div>
          <div class="actions-row">
            <button class="btn" onclick="writeBack()">← Back</button>
            <button class="btn primary" onclick="writeNext()">Next →</button>
          </div>
        ` : ws.step === 3 ? `
          <div class="form-row">
            <label>Lesson body (Markdown)</label>
            <textarea id="w-body" oninput="writeState.body=this.value" style="min-height:340px">${esc(ws.body)}</textarea>
            <div class="form-hint">Use <code>## heading</code> for section headings, <code>**bold**</code>, <code>1. </code> for steps, <code>- </code> for lists.</div>
          </div>
          <div class="form-row">
            <label>Preview</label>
            <div class="article" style="border:1px solid var(--border-soft);padding:14px;background:var(--chrome)">${md(ws.body)}</div>
          </div>
          <div class="actions-row">
            <button class="btn" onclick="writeBack()">← Back</button>
            <button class="btn primary" onclick="writeNext()">Next →</button>
          </div>
        ` : ws.step === 4 ? `
          <p class="small">At least one method is required. Mark one as the canonical (main) method.</p>
          ${ws.methods.map((m,i) => `
            <div style="border:1px solid var(--border-soft);padding:12px;margin-bottom:10px;background:var(--chrome)">
              <div class="form-row" style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px">
                <div><label>Name</label><input value="${esc(m.name)}" oninput="writeState.methods[${i}].name=this.value" /></div>
                <div><label>Level</label>
                  <select onchange="writeState.methods[${i}].level=+this.value">
                    ${[1,2,3,4].map(L => `<option value="${L}" ${m.level===L?'selected':''}>${levelName(L)}</option>`).join("")}
                  </select>
                </div>
                <div><label>Canonical?</label>
                  <select onchange="setMainMethod(${i}, this.value==='yes')">
                    <option value="no" ${!m.isMain?'selected':''}>Alternative</option>
                    <option value="yes" ${m.isMain?'selected':''}>Canonical</option>
                  </select>
                </div>
              </div>
              <div class="form-row"><label>Description</label><textarea oninput="writeState.methods[${i}].body=this.value">${esc(m.body)}</textarea></div>
              ${ws.methods.length > 1 ? `<button class="btn sm" onclick="writeState.methods.splice(${i},1);render()">Remove</button>` : ""}
            </div>
          `).join("")}
          <button class="btn" onclick="writeState.methods.push({name:'New method',level:writeState.level,isMain:false,body:''});render()">+ Add method</button>
          <div class="actions-row">
            <button class="btn" onclick="writeBack()">← Back</button>
            <button class="btn primary" onclick="writeNext()">Next →</button>
          </div>
        ` : `
          <h2>License & submit</h2>
          <p>All lessons on B.L.U.E. are published under <strong>Creative Commons Attribution-ShareAlike 4.0</strong> (CC BY-SA 4.0) — the same license used by Wikipedia.</p>
          <p>This means anyone may read, copy, translate, and adapt your lesson, as long as they credit you and share their adaptations under the same license.</p>
          <div class="form-row" style="margin-top:14px">
            <label style="display:flex;gap:10px;align-items:flex-start;font-weight:400">
              <input type="checkbox" style="width:auto;margin-top:4px" ${ws.licenseOk?'checked':''} onchange="writeState.licenseOk=this.checked;render()" />
              <span>I confirm I have the right to publish this content and I agree to release it under CC BY-SA 4.0.</span>
            </label>
          </div>
          <div class="notice">
            <span class="ico">📝</span>
            <div>On submission, a jury of up to 5 verifiers in <strong>${esc(getSubject(ws.topicId)?.name)}</strong> at Level ≥ ${ws.level} will be randomly selected. They have until the deadline (7 days) to vote with written justifications. A simple majority publishes the lesson.</div>
          </div>
          <div class="actions-row">
            <button class="btn" onclick="writeBack()">← Back</button>
            <button class="btn primary" ${ws.licenseOk?'':'disabled'} onclick="submitLesson()">Submit for review →</button>
          </div>
        `}
      </main>
    </div>
  `;
}
function attachWrite() {
  const sel = document.getElementById("w-subject");
  if (sel) sel.onchange = () => { writeState.topicId = sel.value; render(); };
}
function togglePrereq(id) {
  const i = writeState.prereqs.indexOf(id);
  if (i >= 0) writeState.prereqs.splice(i,1); else writeState.prereqs.push(id);
  render();
}
function toggleCoAuthor(h) {
  const i = writeState.coAuthors.indexOf(h);
  if (i >= 0) writeState.coAuthors.splice(i,1); else writeState.coAuthors.push(h);
  render();
}
function setMainMethod(i, isMain) {
  if (isMain) writeState.methods.forEach((m,j) => m.isMain = j === i);
  else writeState.methods[i].isMain = false;
  if (!writeState.methods.some(m => m.isMain)) writeState.methods[0].isMain = true;
  render();
}
function writeNext() {
  const ws = writeState;
  if (ws.step === 1 && ws.level > 1 && ws.prereqs.length === 0) {
    const c = state.lessons.filter(l => l.status === "PUBLISHED" && l.level < ws.level);
    if (c.length) { toast("Pick at least one prerequisite."); return; }
  }
  if (ws.step === 2) {
    if (!ws.title || ws.title.length < 5) { toast("Title is too short."); return; }
  }
  if (ws.step === 3) {
    if (!ws.body || ws.body.length < 50) { toast("Body is too short."); return; }
  }
  if (ws.step === 4) {
    if (!ws.methods.some(m => m.isMain)) { toast("Mark one method as canonical."); return; }
    if (ws.methods.some(m => !m.name || !m.body)) { toast("Every method needs a name and a description."); return; }
  }
  ws.step = Math.min(5, ws.step + 1);
  render();
}
function writeBack() { writeState.step = Math.max(1, writeState.step - 1); render(); }
function submitLesson() {
  const ws = writeState;
  const id = "g-" + Date.now();
  const eligible = Object.values(state.users).filter(u => u.handle !== state.currentUser && canCheck(u.handle, { topicId: ws.topicId, level: ws.level }));
  let jurySize = Math.min(5, eligible.length); if (jurySize % 2 === 0) jurySize = Math.max(1, jurySize - 1);
  const jury = eligible.sort((a,b)=>b.reputation-a.reputation).slice(0, jurySize).map(u => u.handle);
  const lesson = {
    id, topicId: ws.topicId, level: ws.level,
    title: ws.title, author: state.currentUser, coAuthors: ws.coAuthors,
    status: "IN_REVIEW", thumbsUp: 0, thumbsDown: 0, prereqs: ws.prereqs,
    plainWords: ws.plainWords, inShort: [],
    submittedAt: Date.now(), deadline: Date.now() + 86400000 * 7,
    body: ws.body, layers: [],
    methods: ws.methods.map((m,i) => ({...m, id: "m-"+id+"-"+i, uses: 0})),
    vendors: [], translations: []
  };
  state.lessons.push(lesson);
  state.reviews.push({
    id: "r-" + id, lessonId: id, deadline: lesson.deadline,
    status: "OPEN", jury, votes: []
  });
  state.users[state.currentUser].reputation += 1;
  if (!state.users[state.currentUser].badges.includes("author")) state.users[state.currentUser].badges.push("author");
  save();
  writeState = null;
  toast(`Submitted. ${jury.length} verifier${jury.length===1?"":"s"} will review.`);
  go({page:"lesson", lessonId: id});
}

/* ---------------- REVIEW (verifier voting) ---------------- */
let reviewState = { decision: null, justification: "" };
function renderReview(reviewId) {
  const r = state.reviews.find(x => x.id === reviewId);
  if (!r) return `<div class="layout single"><main class="article"><div class="notice warn"><span class="ico">⚠</span><div>Review not found.</div></div></main></div>`;
  const l = getLesson(r.lessonId);
  const already = r.votes.find(v => v.who === state.currentUser);
  const allowed = r.jury.includes(state.currentUser) || canCheck(state.currentUser, l);

  return `
    <div class="layout">
      <aside class="sidebar">${renderSidebar(l.topicId)}</aside>
      <main id="main" class="article" tabindex="-1">
        <div class="hatnote"><a onclick='go({page:"lesson",lessonId:"${l.id}"})'>← Back to the lesson</a></div>
        <h1 class="firstHeading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;font-weight:700;">Verifier review</h1>
        <p class="subtitle">${esc(l.title)} · jury of ${r.jury.length} · ${r.votes.length} cast · deadline in ${until(r.deadline)}</p>

        <div class="notice">
          <span class="ico">📝</span>
          <div>You are reviewing this lesson as a verifier. Your vote must include a written justification of at least 50 characters. <strong>Silent voting is not allowed.</strong></div>
        </div>

        <div class="infobox">
          <div class="infobox-title">Your vote</div>
          ${!allowed ? `
            <div style="padding:14px"><div class="notice warn" style="margin:0"><span class="ico">⚠</span><div>You are not eligible. Need a verifier role in this subject at Level ≥ ${l.level}.</div></div></div>
          ` : already ? `
            <div style="padding:14px"><div class="notice ok" style="margin:0"><span class="ico">✓</span><div><strong>${already.decision}</strong><br><em>"${esc(already.why)}"</em></div></div></div>
          ` : `
            <div style="padding:14px">
              <p class="small" style="margin-top:0">Form your own opinion before reading others'.</p>
              <div class="just-area">
                <textarea id="just" placeholder="Tell the author what specifically should change or why this should be published as-is." oninput="reviewState.justification=this.value;updateJust()"></textarea>
                <span class="just-counter" id="just-count">0 / 50</span>
              </div>
              <div class="vote-btns" id="vote-btns">
                <button class="${reviewState.decision==='APPROVE'?'sel APPROVE':''}" onclick="setReviewDec('APPROVE')">✓ Approve</button>
                <button class="${reviewState.decision==='REJECT'?'sel REJECT':''}" onclick="setReviewDec('REJECT')">✗ Reject</button>
                <button class="${reviewState.decision==='ABSTAIN'?'sel ABSTAIN':''}" onclick="setReviewDec('ABSTAIN')">– Abstain</button>
              </div>
              <button class="btn primary" style="width:100%;margin-top:10px" id="submit-vote" onclick="submitVote('${r.id}')" disabled>Submit vote</button>
            </div>
          `}
          <div style="padding:10px 14px;border-top:1px solid var(--border-soft)">
            <strong style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em">Jury status</strong>
            ${r.jury.map(h => {
              const v = r.votes.find(x => x.who === h);
              return `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:13px">
                <a onclick='go({page:"profile",handle:"${h}"})'>@${h}</a>
                ${v ? `<span class="dec ${v.decision}">${v.decision}</span>` : `<span class="small">pending</span>`}
              </div>`;
            }).join("")}
          </div>
        </div>

        <h2>Lesson under review</h2>
        ${l.prereqs.length ? `<div class="notice"><span class="ico">📚</span><div><strong>Prereqs declared:</strong> ${l.prereqs.map(p => { const pg = getLesson(p); return pg ? esc(pg.title) : ""; }).join(", ")}.</div></div>` : ""}
        ${l.plainWords ? `<div class="plain"><div class="lbl">📘 In plain words</div>${md(l.plainWords)}</div>` : ""}
        <div>${md(l.body).replace(/<p>LAYERSTACK<\/p>/g,'').replace(/<p>METHODSTACK<\/p>/g,'').replace(/<p>COLORTABLE<\/p>/g,'')}</div>

        <h2>Methods proposed</h2>
        ${l.methods.map(m => `
          <details class="method ${m.isMain?'main':''}" ${m.isMain?'open':''}>
            <summary>
              ${esc(m.name)}
              ${m.isMain?'<span class="main-badge">Canonical</span>':''}
              <span class="m-meta">${levelTag(m.level)}</span>
            </summary>
            <div class="m-body">${md(m.body)}</div>
          </details>
        `).join("")}

        <h2>Other verifiers' votes</h2>
        ${r.votes.length === 0 ? `<p class="small">No votes yet.</p>` : r.votes.map(v => `
          <div class="vote-row">
            <span class="who">@${v.who}</span><span class="dec ${v.decision}">${v.decision}</span>
            <div class="why">${esc(v.why)}</div>
          </div>
        `).join("")}
      </main>
    </div>
  `;
}
function attachReview() {
  reviewState = { decision: null, justification: "" };
  updateJust();
}
function updateJust() {
  const c = document.getElementById("just-count"); if (!c) return;
  const len = reviewState.justification.length;
  c.textContent = `${len} / 50`;
  c.classList.toggle("ok", len >= 50);
  const b = document.getElementById("submit-vote");
  if (b) b.disabled = !(reviewState.decision && len >= 50);
}
function setReviewDec(d) {
  reviewState.decision = d;
  document.querySelectorAll("#vote-btns button").forEach(b => b.classList.remove("sel","APPROVE","REJECT","ABSTAIN"));
  event.target.classList.add("sel", d);
  updateJust();
}
function submitVote(rid) {
  const r = state.reviews.find(x => x.id === rid); if (!r) return;
  if (!reviewState.decision) { toast("Pick a decision."); return; }
  if (reviewState.justification.length < 50) { toast("Justification too short."); return; }
  r.votes.push({ who: state.currentUser, decision: reviewState.decision, why: reviewState.justification, at: Date.now() });
  state.users[state.currentUser].reputation += 2;
  if (r.votes.length >= r.jury.length) closeReview(r);
  save();
  toast("Vote recorded.");
  render();
}
function closeReview(r) {
  const yes = r.votes.filter(v => v.decision === "APPROVE").length;
  const no = r.votes.filter(v => v.decision === "REJECT").length;
  const l = getLesson(r.lessonId); if (!l) return;
  if (yes > no) {
    l.status = "PUBLISHED"; l.publishedAt = Date.now();
    r.status = "CLOSED_APPROVED";
    state.users[l.author].reputation += 10;
  } else {
    l.status = "RETURNED"; r.status = "CLOSED_REJECTED";
  }
}

  return `

      <main id="main" class="article" tabindex="-1">

        ${u.verifierRoles.length === 0 ? `<p class="small">You have no verifier roles yet.</p>` : `<ul>${u.verifierRoles.map(r => `<li><strong>${esc(getSubject(r.subjectId)?.name || r.subjectId)}</strong> — up to ${levelName(r.maxLevel)}</li>`).join("")}</ul>`}

        <h2>Apply for a new role</h2>
        <div class="form-row">
          <label>Subject</label>
          <select id="v-subject">

          </select>
        </div>
        <div class="form-row">
          <label>Maximum level you want to verify</label>

          </div>
        </div>
        <div class="notice"><span class="ico">ℹ</span><div>The real exam would test you at every level up to your target. For demo purposes, clicking the button just grants the role.</div></div>

        </div>

  `;
}
function grantVerifier() {
  const subjectId = document.getElementById("v-subject").value;
  const lvl = document.querySelector("#v-level .pick.sel");
  const maxLevel = lvl ? +lvl.dataset.level : 1;
  const u = state.users[state.currentUser];
  const existing = u.verifierRoles.find(r => r.subjectId === subjectId);
  if (existing) existing.maxLevel = Math.max(existing.maxLevel, maxLevel);
  else u.verifierRoles.push({ subjectId, maxLevel });
  if (u.verifierRoles.length >= 2 && !u.badges.includes("polymath")) u.badges.push("polymath");
  save(); toast("Verifier role granted."); render();
}
document.addEventListener("click", (e) => {
  const p = e.target.closest("#v-level .pick");
  if (!p) return;
  document.querySelectorAll("#v-level .pick").forEach(x => x.classList.remove("sel"));
  p.classList.add("sel");
});

/* ---------------- DISPUTES ---------------- */
let disputeFilter = "ALL";
function renderDisputes() {

  return `
    <div class="layout">
      <aside class="sidebar">${renderSidebar()}</aside>
      <main id="main" class="article" tabindex="-1">

        <p class="subtitle">An open docket of editorial disputes. Anyone with ≥10 reputation can open one.</p>

        <div class="pick-list" style="margin-bottom:14px">
          ${["ALL","OPEN","UNDER_REVIEW","RESOLVED","DISMISSED"].map(f => {
            const n = f === "ALL" ? state.disputes.length : state.disputes.filter(d => d.status === f).length;
            return `<div class="pick ${disputeFilter===f?'sel':''}" onclick="disputeFilter='${f}';render()">${f.replace(/_/g," ").toLowerCase()} (${n})</div>`;

        ${list.length === 0 ? `<div class="empty"><h3>Nothing here</h3></div>` : `<div class="docket">

          ${list.map(d => `
            <div class="drow" onclick='go({page:"dispute",disputeId:"${d.id}"})'>
              <span>${status(d.status)}</span>
              <span class="small">${d.type.replace(/_/g," ").toLowerCase()}</span>
              <span>${d.lessonId ? esc(getLesson(d.lessonId)?.title || "") : '<em class="small">site-wide</em>'}</span>
              <span class="small">@${d.openerId}</span>
              <span class="small">${ago(d.openedAt).replace(" ago","")}</span>

        </div>`}
      </main>

  `;
}
function renderDispute(id) {
  const d = state.disputes.find(x => x.id === id);
  if (!d) return `<div class="layout single"><main class="article"><div class="notice warn"><span class="ico">⚠</span><div>Dispute not found.</div></div></main></div>`;
  return `
    <div class="layout single">
      <main id="main" class="article" tabindex="-1">
        <div class="hatnote"><a onclick='go({page:"disputes"})'>← All disputes</a></div>
        <h1 class="firstHeading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;font-weight:700;">Dispute #${d.id}</h1>
        <p class="subtitle">${d.type.replace(/_/g," ").toLowerCase()} · opened ${ago(d.openedAt)} by @${d.openerId}</p>
        <div class="row" style="margin:14px 0">${status(d.status)} ${d.lessonId ? `on <a onclick='go({page:"lesson",lessonId:"${d.lessonId}"})'>${esc(getLesson(d.lessonId)?.title || "")}</a>` : ""}</div>
        <div style="background:var(--chrome);padding:14px;border:1px solid var(--border-soft)">${esc(d.body)}</div>
        ${d.resolution ? `<div class="notice ok"><span class="ico">✓</span><div><strong>Resolution:</strong> ${esc(d.resolution)}</div></div>` : ""}
        ${d.status === "OPEN" || d.status === "UNDER_REVIEW" ? `
          <div class="actions-row">
            <button class="btn" onclick="resolveDispute('${d.id}','DISMISSED','Dismissed (demo).')">Dismiss</button>
            <button class="btn primary" onclick="resolveDispute('${d.id}','RESOLVED','Resolved (demo).')">Mark resolved</button>
          </div>
        ` : ""}
      </main>
    </div>
  `;
}
function resolveDispute(id, status, resolution) {
  const d = state.disputes.find(x => x.id === id); if (!d) return;
  d.status = status; d.resolution = resolution; d.resolvedAt = Date.now();
  save(); toast("Dispute "+status.toLowerCase()+"."); render();
}

/* ---------------- WISHES ---------------- */
function renderWishes() {
  const u = state.users[state.currentUser];
  return `
    <div class="layout">
      <aside class="sidebar">${renderSidebar()}</aside>
      <main id="main" class="article" tabindex="-1">
        <h1 class="firstHeading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;font-weight:700;">Lesson wishes</h1>
        <p class="subtitle">Lessons the community wants written. Pledge reputation to back a wish; the writer earns a bonus.</p>

        <div class="notice">
          <span class="ico">💡</span>
          <div>Wishes use <strong>reputation points</strong>, not money. This keeps B.L.U.E. free while letting readers signal demand and rewarding writers who answer.</div>
        </div>

        <div class="actions-row" style="justify-content:flex-start;margin-bottom:14px">
          <button class="btn primary" onclick="openWish()">+ Open a new wish</button>
        </div>

        <div class="card-list">
          ${state.wishes.map(w => {
            const pct = Math.min(100, Math.round(w.pointsPledged / w.pointsGoal * 100));
            const topic = getSubject(w.topicId);
            const backed = w.backers.includes(state.currentUser);
            return `
              <div class="card">
                <div style="display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap">
                  <div style="flex:1;min-width:240px">
                    <div class="card-title">${esc(w.title)}</div>
                    <p class="small" style="margin:4px 0;color:var(--ink-soft)">${esc(w.why)}</p>
                    <div class="card-meta">
                      ${levelTag(w.forLevel)} ${levelName(w.forLevel)}
                      <span>in ${esc(topic?.name || "")}</span>
                      <span>${w.backers.length} backer${w.backers.length===1?"":"s"}</span>
                      <span>by @${w.openedBy} ${ago(w.openedAt)}</span>
                      ${status(w.status)}
                    </div>
                    <div class="bar"><div style="width:${pct}%"></div></div>
                    <p class="small">${w.pointsPledged} / ${w.pointsGoal} points pledged${pct>=100?' · funded!':''}</p>
                  </div>
                  <div style="display:flex;flex-direction:column;gap:6px">
                    ${w.status === "RESOLVED" ? `<a class="btn sm" onclick='go({page:"lesson",lessonId:"${w.lessonId}"})'>View lesson →</a>` : `
                      <button class="btn sm ${backed?'':'primary'}" onclick="pledgeWish('${w.id}')" ${u.reputation < 5 && !backed ? 'disabled':''}>${backed?'✓ Pledged':'Pledge 5 points'}</button>
                      <button class="btn sm" onclick="claimWish('${w.id}')">I'll write it</button>
                    `}
                  </div>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      </main>
    </div>
  `;
}
function pledgeWish(id) {
  const w = state.wishes.find(x => x.id === id); if (!w) return;
  const u = state.users[state.currentUser];
  if (w.backers.includes(state.currentUser)) { toast("Already pledged."); return; }
  if (u.reputation < 5) { toast("Need 5 points to pledge."); return; }
  w.backers.push(state.currentUser);
  w.pointsPledged += 5;
  u.reputation -= 5;
  if (w.pointsPledged >= w.pointsGoal && w.status === "OPEN") w.status = "FUNDED";
  save(); toast(`Pledged. Wish is at ${w.pointsPledged}/${w.pointsGoal}.`); render();
}
function claimWish(id) {
  const w = state.wishes.find(x => x.id === id); if (!w) return;
  writeState = null; go({page:"write"});
  setTimeout(() => {
    if (!writeState) return;
    writeState.topicId = w.topicId;
    writeState.level = w.forLevel;
    writeState.title = w.title;
    render();
    toast(`Starting wish: ${w.title}`);
  }, 80);
}
function openWish() {
  const title = prompt("Title of the wish (start with 'How to…')");
  if (!title) return;
  const why = prompt("Why is this lesson needed?");
  if (!why) return;
  state.wishes.unshift({
    id: "w-" + Date.now(), title, why,
    topicId: state.subjects[0].id, forLevel: 1,
    pointsPledged: 5, pointsGoal: 100, status: "OPEN",
    backers: [state.currentUser], openedBy: state.currentUser, openedAt: Date.now()
  });
  state.users[state.currentUser].reputation -= 5;
  save(); toast("Wish opened."); render();
}

/* ---------------- RFCs ---------------- */
function renderRFCs() {
  return `
    <div class="layout">
      <aside class="sidebar">${renderSidebar()}</aside>
      <main id="main" class="article" tabindex="-1">
        <h1 class="firstHeading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;font-weight:700;">Architecture (Requests for Comment)</h1>
        <p class="subtitle">Public proposals for changes to how the site works. Numbered, public, immutable. Modelled on Python PEPs and Rust RFCs.</p>

        <div class="notice">
          <span class="ico">💡</span>
          <div>This is how Sebastian's "fundamental architecture agreement" problem gets solved. Every structural decision is debated and voted on publicly, with the rationale preserved forever — even rejected proposals are kept.</div>
        </div>

        <div class="actions-row" style="justify-content:flex-start;margin-bottom:14px">
          <button class="btn primary" onclick="openRFC()">+ Open a new RFC</button>
        </div>

        <div class="card-list">
          ${state.rfcs.map(r => {
            const total = r.forCount + r.againstCount;
            const pct = total ? (r.forCount/total*100) : 50;
            return `
              <div class="card clickable" onclick='go({page:"rfc-detail",rfcId:"${r.id}"})'>
                <div class="row" style="margin-bottom:6px">
                  <span class="status" style="font-family:var(--mono)">RFC-${String(r.num).padStart(3,"0")}</span>
                  ${status(r.status)}
                </div>
                <div class="card-title">${esc(r.title)}</div>
                <p class="small" style="margin:6px 0">${esc(r.summary)}</p>
                <div class="row" style="margin-top:8px">
                  <span class="small">👍 ${r.forCount}</span>
                  <div style="flex:1;height:8px;background:var(--chrome);max-width:240px;overflow:hidden;display:flex">
                    <div style="width:${pct}%;background:var(--lev1-text)"></div>
                    <div style="width:${100-pct}%;background:var(--lev4-text)"></div>
                  </div>
                  <span class="small">${r.againstCount} 👎</span>
                </div>
                <p class="small" style="margin:6px 0 0">by @${r.author} · ${ago(r.whenOpened)}</p>
              </div>
            `;
          }).join("")}
        </div>
      </main>
    </div>
  `;
}
function renderRFCDetail(id) {
  const r = state.rfcs.find(x => x.id === id);
  if (!r) return `<div class="layout single"><main class="article"><div class="notice warn"><span class="ico">⚠</span><div>RFC not found.</div></div></main></div>`;
  return `
    <div class="layout single">
      <main id="main" class="article" tabindex="-1">
        <div class="hatnote"><a onclick='go({page:"rfc"})'>← All RFCs</a></div>
        <h1 class="firstHeading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;font-weight:700;">${esc(r.title)}</h1>
        <p class="subtitle">RFC-${String(r.num).padStart(3,"0")} · by @${r.author} · opened ${ago(r.whenOpened)} · ${status(r.status)}</p>

        <h2>Summary</h2>
        <p>${esc(r.summary)}</p>
        <h2>Motivation</h2>
        <p>This RFC was opened to resolve a structural question. RFCs are how the project makes decisions that can't be solved by voting on individual lessons — things like license choice, architecture, jury sizing, governance.</p>
        <h2>Current tally</h2>
        <ul>
          <li><strong>${r.forCount}</strong> in favour</li>
          <li><strong>${r.againstCount}</strong> opposed</li>
        </ul>

        ${r.status === "PROPOSED" ? `
          <div class="notice">
            <span class="ico">🗳️</span>
            <div>Voting is open. After 7 days of discussion, the RFC enters a 10-day Final Comment Period before being accepted or rejected.</div>
          </div>
          <div class="actions-row" style="justify-content:flex-start">
            <button class="btn primary" onclick="voteRFC('${r.id}', 1)">👍 Vote in favour</button>
            <button class="btn" onclick="voteRFC('${r.id}', -1)">👎 Vote against</button>
          </div>
        ` : `
          <div class="notice ${r.status==='ACCEPTED'?'ok':''}">
            <span class="ico">${r.status==='ACCEPTED'?'✓':'i'}</span>
            <div>This RFC is <strong>${r.status.toLowerCase()}</strong>. The decision is preserved here for institutional memory.</div>
          </div>
        `}
      </main>
    </div>
  `;
}
function voteRFC(id, dir) {
  const r = state.rfcs.find(x => x.id === id); if (!r) return;
  if (dir === 1) r.forCount++; else r.againstCount++;
  save(); toast("Vote recorded."); render();
}
function openRFC() {
  if (state.users[state.currentUser].reputation < 5) { toast("Need 5+ points to open an RFC."); return; }
  const title = prompt("RFC title:");
  if (!title) return;
  const summary = prompt("One-sentence summary:");
  if (!summary) return;
  state.rfcs.unshift({
    id: "rfc-" + Date.now(),
    num: Math.max(...state.rfcs.map(r => r.num)) + 1,
    title, summary, status: "PROPOSED",
    author: state.currentUser, whenOpened: Date.now(),
    forCount: 1, againstCount: 0
  });
  save(); toast("RFC opened."); render();
}

/* ---------------- ROLES ---------------- */

  const roles = [

    { icon: "⚖", title: "Auditor", who: "Elected by senior verifiers", desc: "Resolves disputes, approves new subjects. Does not write or vote on lessons.", count: 2 },
    { icon: "★", title: "Mentor", who: "200+ reputation verifiers", desc: "Trains new verifiers. Earns mentor reputation when mentees pass.", count: Object.values(state.users).filter(u => u.badges.includes("mentor")).length },
    { icon: "✦", title: "Moderator", who: "Founding mod team", desc: "Triages spam and disputes, keeps community discussion healthy.", count: 3 },
    { icon: "⚙", title: "Maintainer", who: "Trusted technical contributors", desc: "Reviews and merges code changes. Different maintainers own different parts.", count: 4 },
    { icon: "🛡", title: "Steward", who: "Elected from auditors + maintainers", desc: "Holds the legal entity and the project's keys. 3–5 seats. Last-resort arbiter.", count: 3 }

  return `
    <div class="layout">
      <aside class="sidebar">${renderSidebar()}</aside>
      <main id="main" class="article" tabindex="-1">
        <h1 class="firstHeading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;font-weight:700;">Roles &amp; jobs</h1>
        <p class="subtitle">How collaboration is structured on B.L.U.E. Inspired by Sebastian's forum post on role assignment.</p>

        <div class="notice">
          <span class="ico">🤝</span>
          <div>From <a href="https://github.com/SebReyWriter/TheBLUEForum/discussions" target="_blank" rel="noopener">the official forum</a>: "Ideally, different people should be responsible for different parts of the build." This page is how that works.</div>
        </div>

        <h2>The seven roles</h2>
        <div class="card-grid">
          ${roles.map(r => `
            <div class="card">
              <div style="font-size:24px;margin-bottom:4px">${r.icon}</div>
              <div class="card-title">${r.title} <span class="small" style="font-weight:400">· ${r.count}</span></div>
              <p class="small" style="color:var(--ink-soft);margin:6px 0">${r.desc}</p>
              <p class="small"><strong>Who:</strong> ${r.who}</p>
            </div>
          `).join("")}
        </div>

        <h2>Currently looking for</h2>
        <p>These roles are open right now. If you'd like one, post on <a href="https://github.com/SebReyWriter/TheBLUEForum/discussions" target="_blank" rel="noopener">the forum</a>.</p>
        <ul>${state.openJobs.map(j => `<li><strong>${esc(j)}</strong></li>`).join("")}</ul>

        <h2>Top contributors</h2>
        <div class="card-grid">
          ${Object.values(state.users).sort((a,b)=>b.reputation-a.reputation).slice(0,6).map(u => `
            <div class="card clickable" onclick='go({page:"profile",handle:"${u.handle}"})'>
              <div class="row">
                <div class="avatar">${userEmoji(u.handle)}</div>
                <div>
                  <div class="card-title">@${u.handle}</div>
                  <p class="small" style="margin:2px 0 0">${u.reputation} points · ${u.verifierRoles.length} role${u.verifierRoles.length===1?"":"s"}</p>
                </div>
              </div>
              <div class="row" style="gap:4px;margin-top:8px;flex-wrap:wrap">
                ${u.badges.slice(0,3).map(b => BADGES[b] ? `<span class="status">${BADGES[b].label}</span>` : "").join("")}

/* =====================================================
   CMD-K SEARCH
   ===================================================== */
let cmdkSel = 0; let cmdkResults = [];
function openCmdk() {
  document.getElementById("cmdk").classList.add("open");
  const i = document.getElementById("cmdk-input"); i.value = ""; i.focus();
  renderCmdk();
}
function closeCmdk() { document.getElementById("cmdk").classList.remove("open"); }
function renderCmdk() {
  const q = document.getElementById("cmdk-input").value.toLowerCase().trim();
  const results = [];
  state.lessons.forEach(l => {
    if (!q || l.title.toLowerCase().includes(q) || (l.body || "").toLowerCase().includes(q))
      results.push({ kind: "Lesson", text: l.title, act: () => { closeCmdk(); go({page:"lesson",lessonId:l.id}); } });
  });
  state.subjects.forEach(s => {
    if (!q || s.name.toLowerCase().includes(q))
      results.push({ kind: "Subject", text: s.name, act: () => { closeCmdk(); go({page:"subject",subjectId:s.id}); } });
  });
  state.wishes.forEach(w => {
    if (!q || w.title.toLowerCase().includes(q))
      results.push({ kind: "Wish", text: w.title, act: () => { closeCmdk(); go({page:"wishes"}); } });
  });
  state.rfcs.forEach(r => {
    if (!q || r.title.toLowerCase().includes(q))
      results.push({ kind: "RFC", text: `RFC-${String(r.num).padStart(3,"0")}: ${r.title}`, act: () => { closeCmdk(); go({page:"rfc-detail",rfcId:r.id}); } });
  });
  cmdkSel = 0;
  const el = document.getElementById("cmdk-results");
  el.innerHTML = results.slice(0, 16).map((r,i) => `<div class="result ${i===0?'sel':''}" data-i="${i}"><span class="kind">${r.kind}</span> ${esc(r.text)}</div>`).join("") || `<div class="result small">No results.</div>`;
  el.querySelectorAll(".result[data-i]").forEach(r => { r.onclick = () => results[+r.dataset.i].act(); });
  cmdkResults = results;
}
function cmdkKey(e) {
  if (e.key === "Escape") closeCmdk();
  if (e.key === "Enter") { if (cmdkResults[cmdkSel]) cmdkResults[cmdkSel].act(); }
  if (e.key === "ArrowDown" || e.key === "ArrowUp") {
    e.preventDefault();
    cmdkSel = Math.max(0, Math.min(cmdkResults.length-1, cmdkSel + (e.key==="ArrowDown"?1:-1)));
    document.querySelectorAll("#cmdk-results .result").forEach((r,i) => r.classList.toggle("sel", i===cmdkSel));
  }
}
