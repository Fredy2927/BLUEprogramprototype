<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>B.L.U.E. — Learn how to do anything</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  /* =====================================================
     B.L.U.E. — Super simple, friendly, easy to read.
     Big text. Lots of space. Plain words everywhere.
     ===================================================== */

  :root {
    --bg: #fdfcf9;          /* warm off-white */
    --card: #ffffff;
    --soft: #f3efe7;        /* warm cream */
    --soft-2: #ebe5d7;
    --border: #e0d9c8;
    --border-strong: #c8bfa9;
    --ink: #1f2937;         /* dark blue-grey */
    --ink-soft: #4b5563;
    --muted: #7a8295;
    --blue: #2b6cb0;        /* friendly blue */
    --blue-soft: #e7f0fa;
    --blue-strong: #1f4f87;
    --green: #2f855a;
    --green-soft: #e6f4eb;
    --yellow: #b7791f;
    --yellow-soft: #fdf3d8;
    --red: #c53030;
    --red-soft: #fbe9e7;
    --purple: #6b46c1;
    --purple-soft: #ede9fe;

    --r: 12px;     /* rounded corners */
    --r-lg: 18px;
    --r-pill: 999px;

    --shadow: 0 2px 8px rgba(40, 35, 25, .05);
    --shadow-lg: 0 6px 24px rgba(40, 35, 25, .08);

    --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  [data-theme="dark"] {
    --bg: #14171c; --card: #1c2027; --soft: #232831; --soft-2: #2d3340;
    --border: #2e3441; --border-strong: #3d4554;
    --ink: #f1f5f9; --ink-soft: #cbd5e1; --muted: #8b95a8;
    --blue: #6ba6e8; --blue-soft: #1a2942; --blue-strong: #8ab9f0;
    --green: #5fcf91; --green-soft: #18301f;
    --yellow: #f0c674; --yellow-soft: #322910;
    --red: #f0807a; --red-soft: #321a18;
    --purple: #a78bfa; --purple-soft: #221a3e;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }

  html, body {
    margin: 0; min-height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: var(--font);
    font-size: clamp(17px, 1rem + 0.2vw, 19px);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* ============ LINKS ============ */
  a { color: var(--blue); text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; text-underline-offset: 3px; }

  /* ============ FORMS ============ */
  input, textarea, select {
    background: var(--card); color: var(--ink);
    border: 2px solid var(--border);
    padding: 12px 14px; font: inherit; width: 100%;
    border-radius: var(--r);
    transition: border-color .12s, box-shadow .12s;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 4px var(--blue-soft);
  }
  textarea { min-height: 120px; resize: vertical; font-family: var(--font); }
  label {
    display: block; font-size: 16px; color: var(--ink);
    margin-bottom: 8px; font-weight: 600;
  }
  button { font: inherit; cursor: pointer; }

  /* ============ FOCUS (a11y) ============ */
  :focus { outline: none; }
  :focus-visible {
    outline: 3px solid var(--blue);
    outline-offset: 3px;
    border-radius: 6px;
  }

  /* Skip link */
  .skip-link {
    position: absolute; top: -50px; left: 12px; z-index: 1000;
    background: var(--blue); color: #fff;
    padding: 12px 18px; border-radius: var(--r);
    font-weight: 700; font-size: 15px;
    transition: top .15s;
  }
  .skip-link:focus { top: 12px; text-decoration: none; }

  ::selection { background: var(--blue-soft); color: var(--ink); }

  /* =====================================================
     TOP BAR
     ===================================================== */
  header.topbar {
    background: var(--card);
    border-bottom: 2px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .logo {
    display: flex; align-items: baseline; gap: 10px;
    cursor: pointer; text-decoration: none;
  }
  .logo-mark {
    font-weight: 800; font-size: 22px;
    color: var(--ink); letter-spacing: -0.02em;
  }
  .logo-mark .dot { color: var(--blue); }
  .logo-tag {
    font-size: 14px; color: var(--muted); font-weight: 500;
  }
  .spacer { flex: 1; }

  .search-wrap { position: relative; max-width: 420px; flex: 0 1 380px; }
  .search {
    border-radius: var(--r-pill);
    padding-left: 44px; padding-right: 60px;
    background: var(--soft); border-color: transparent;
    cursor: pointer;
  }
  .search:hover { background: var(--soft-2); }
  .search-wrap::before {
    content: "🔍"; position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%); font-size: 16px; pointer-events: none;
  }
  .kbd-tip {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 12px; font-weight: 600; pointer-events: none;
    background: var(--card); padding: 2px 7px; border-radius: 4px;
    border: 1px solid var(--border);
  }
  .icon-btn {
    background: transparent; border: 2px solid transparent;
    width: 42px; height: 42px; border-radius: var(--r-pill);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--ink);
  }
  .icon-btn:hover { background: var(--soft); }
  .user-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px 6px 6px; border-radius: var(--r-pill);
    background: var(--soft); color: var(--ink);
    font-weight: 600; font-size: 15px;
  }
  .user-pill:hover { background: var(--soft-2); text-decoration: none; }
  .user-pill .av {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: #fff; font-weight: 700; font-size: 14px;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* =====================================================
     TABS
     ===================================================== */
  .tabbar {
    background: var(--card); border-bottom: 2px solid var(--border);
    padding: 0 24px;
    display: flex; gap: 4px;
    overflow-x: auto;
  }
  .tabbar .tab {
    padding: 14px 18px; font-size: 16px; font-weight: 600;
    color: var(--muted); cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap; user-select: none;
    display: inline-flex; align-items: center; gap: 8px;
    transition: color .12s, border-color .12s;
  }
  .tabbar .tab:hover { color: var(--ink); }
  .tabbar .tab.active {
    color: var(--blue); border-bottom-color: var(--blue);
  }
  .tabbar .tab .emoji { font-size: 18px; }

  /* =====================================================
     LAYOUT
     ===================================================== */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px 80px;
    gap: 32px;
  }
  .layout.with-rail { grid-template-columns: 240px minmax(0, 1fr) 240px; }
  .layout.single { grid-template-columns: 1fr; max-width: 800px; }

  @media (max-width: 1100px) {
    .layout.with-rail { grid-template-columns: 240px 1fr; }
    .right-rail { display: none; }
  }
  @media (max-width: 880px) {
    .layout, .layout.with-rail, .layout.single {
      grid-template-columns: 1fr; padding: 20px 16px 60px; gap: 20px;
    }
    .sidebar { display: none; }
  }

  /* ============ HAMBURGER (mobile) ============ */
  .hamburger {
    display: none;
    background: var(--soft); border: 2px solid transparent;
    width: 42px; height: 42px; border-radius: var(--r);
    color: var(--ink); font-size: 20px; line-height: 1;
    align-items: center; justify-content: center;
  }
  .hamburger:hover { background: var(--soft-2); }
  .drawer-scrim {
    display: none; position: fixed; inset: 0;
    background: rgba(20, 30, 50, .4); z-index: 90;
  }
  .drawer-scrim.open { display: block; }
  @media (max-width: 880px) {
    .hamburger { display: inline-flex; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 280px; max-width: 80vw;
      background: var(--card); border-right: 2px solid var(--border);
      padding: 24px; z-index: 95; overflow-y: auto;
      transform: translateX(-100%); transition: transform .2s ease;
      box-shadow: var(--shadow-lg);
    }
    .sidebar.open { transform: translateX(0); display: block; }
  }

  /* =====================================================
     SIDEBAR
     ===================================================== */
  .sidebar { font-size: 15px; }
  .sidebar h4 {
    font-size: 13px; color: var(--muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin: 24px 0 10px;
  }
  .sidebar h4:first-child { margin-top: 0; }
  .sidebar ul { list-style: none; padding: 0; margin: 0; }
  .sidebar li { padding: 0; }
  .sidebar a {
    color: var(--ink-soft); display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; margin: 2px -10px;
    border-radius: var(--r); font-weight: 500;
  }
  .sidebar a:hover { background: var(--soft); color: var(--ink); text-decoration: none; }
  .sidebar a.active { background: var(--blue-soft); color: var(--blue-strong); font-weight: 700; }
  .sidebar a .e { font-size: 16px; }
  .topic-tree ul { padding-left: 16px; }
  .topic-tree .row {
    cursor: pointer; padding: 6px 10px; margin: 2px -10px;
    border-radius: var(--r); color: var(--ink-soft); font-weight: 500;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topic-tree .row:hover { background: var(--soft); color: var(--ink); }
  .topic-tree li.active > .row { background: var(--blue-soft); color: var(--blue-strong); font-weight: 700; }
  .topic-tree .count {
    color: var(--muted); font-size: 13px; font-weight: 500;
    background: var(--soft); padding: 0 7px; border-radius: var(--r-pill);
  }

  /* =====================================================
     ARTICLE / MAIN CONTENT
     ===================================================== */
  .article { background: transparent; min-height: 60vh; }
  .page-title {
    font-size: clamp(28px, 1.4rem + 1.2vw, 40px);
    font-weight: 800; line-height: 1.15;
    letter-spacing: -0.025em;
    margin: 0 0 8px;
    color: var(--ink);
    scroll-margin-top: 80px;
  }
  .page-subtitle {
    font-size: 17px; color: var(--ink-soft);
    margin: 0 0 24px; font-weight: 500;
  }
  .breadcrumb {
    font-size: 14px; color: var(--muted); margin-bottom: 12px;
    font-weight: 500;
  }
  .breadcrumb a { color: var(--muted); }
  .breadcrumb a:hover { color: var(--blue); }
  .breadcrumb .sep { margin: 0 6px; }

  /* ============ NOTICES (friendly tip boxes) ============ */
  .notice {
    background: var(--blue-soft);
    border-left: 6px solid var(--blue);
    padding: 16px 18px; margin: 18px 0;
    border-radius: var(--r);
    font-size: 16px; color: var(--ink);
    display: flex; gap: 14px; align-items: flex-start;
  }
  .notice.tip { background: var(--yellow-soft); border-left-color: var(--yellow); }
  .notice.warn { background: var(--red-soft); border-left-color: var(--red); }
  .notice.ok { background: var(--green-soft); border-left-color: var(--green); }
  .notice .ne {
    font-size: 24px; line-height: 1; flex-shrink: 0;
  }
  .notice strong { font-weight: 700; }

  /* ============ LESSON BODY ============ */
  .lesson-body {
    font-size: clamp(17px, 1rem + 0.2vw, 19px);
    line-height: 1.75;
    color: var(--ink);
    max-width: 70ch;
  }
  .lesson-body p { margin: 0.8em 0; }
  .lesson-body h2 {
    font-size: clamp(22px, 1.2rem + 0.4vw, 26px);
    font-weight: 700; margin: 36px 0 12px;
    color: var(--ink); letter-spacing: -0.01em;
    scroll-margin-top: 80px;
    display: flex; align-items: center; gap: 10px;
  }
  .lesson-body h3 {
    font-size: 19px; font-weight: 700;
    margin: 24px 0 8px; color: var(--ink);
    scroll-margin-top: 80px;
  }
  .lesson-body ul, .lesson-body ol { padding-left: 1.8em; margin: 0.6em 0; }
  .lesson-body li { margin: 0.3em 0; }
  .lesson-body code {
    background: var(--soft); padding: 2px 8px;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 0.9em; border-radius: 5px;
  }
  .lesson-body pre {
    background: var(--soft); padding: 14px 16px;
    border: 1px solid var(--border); overflow-x: auto;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 14px; border-radius: var(--r);
    max-width: none;
  }
  .lesson-body table {
    border-collapse: separate; border-spacing: 0;
    margin: 18px 0; font-size: 16px;
    border: 2px solid var(--border); border-radius: var(--r);
    overflow: hidden; max-width: none;
  }
  .lesson-body th, .lesson-body td {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 10px 14px; text-align: left;
  }
  .lesson-body th:last-child, .lesson-body td:last-child { border-right: 0; }
  .lesson-body tr:last-child td { border-bottom: 0; }
  .lesson-body th { background: var(--soft); font-weight: 700; }

  /* ============ "BEFORE THIS LESSON" BOX ============ */
  .before-box {
    background: var(--purple-soft);
    border: 2px solid var(--purple);
    padding: 18px 20px; margin: 20px 0;
    border-radius: var(--r-lg);
  }
  .before-box .title {
    font-size: 15px; font-weight: 700; color: var(--purple);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .before-box .lesson-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; background: var(--card);
    border: 2px solid var(--purple); border-radius: var(--r);
    margin: 4px 6px 4px 0; font-weight: 600;
    color: var(--purple); font-size: 15px;
  }
  .before-box .lesson-link:hover { background: var(--purple); color: #fff; text-decoration: none; }

  /* ============ INFO PANEL (right side of guide) ============ */
  .info-panel {
    background: var(--card); border: 2px solid var(--border);
    border-radius: var(--r-lg); padding: 18px;
    margin: 0 0 18px 24px;
    font-size: 15px; float: right; width: 280px;
    box-shadow: var(--shadow);
  }
  .info-panel .ip-title {
    font-size: 13px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 12px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .info-panel dl { margin: 0; }
  .info-panel dt { color: var(--muted); font-size: 13px; margin-top: 10px; }
  .info-panel dd { margin: 2px 0 0; color: var(--ink); font-weight: 500; }
  .info-panel dt:first-child { margin-top: 0; }
  .info-panel .actions { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .info-panel .actions .act {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0; color: var(--blue); font-weight: 600; font-size: 15px;
    cursor: pointer;
  }
  .info-panel .actions .act:hover { color: var(--blue-strong); text-decoration: underline; }
  @media (max-width: 700px) {
    .info-panel { float: none; width: 100%; margin: 0 0 16px; }
  }

  /* ============ TABLE OF CONTENTS (right rail) ============ */
  .right-rail {
    position: sticky; top: 80px; align-self: start;
    font-size: 14px; max-height: calc(100vh - 100px); overflow-y: auto;
  }
  .right-rail h5 {
    font-size: 13px; color: var(--muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em;
    margin: 0 0 12px;
  }
  .right-rail ol { list-style: none; padding-left: 0; margin: 0; counter-reset: r; }
  .right-rail li { counter-increment: r; padding: 2px 0; }
  .right-rail a {
    color: var(--ink-soft); display: block; padding: 6px 12px;
    margin-left: -6px; border-radius: var(--r);
    border-left: 3px solid transparent;
  }
  .right-rail a:hover { background: var(--soft); text-decoration: none; }
  .right-rail a.active {
    color: var(--blue); background: var(--blue-soft);
    border-left-color: var(--blue); font-weight: 700;
  }

  /* =====================================================
     BUTTONS
     ===================================================== */
  .btn {
    background: var(--card); border: 2px solid var(--border-strong);
    padding: 12px 22px; border-radius: var(--r-pill);
    color: var(--ink); font-size: 16px; font-weight: 600;
    transition: transform .08s, background .12s, border-color .12s;
    display: inline-flex; align-items: center; gap: 8px;
    min-height: 44px;
  }
  .btn:hover { background: var(--soft); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn.primary {
    background: var(--blue); border-color: var(--blue); color: #fff;
  }
  .btn.primary:hover { background: var(--blue-strong); border-color: var(--blue-strong); }
  .btn.big { padding: 14px 28px; font-size: 17px; }
  .btn.sm { padding: 8px 16px; font-size: 14px; min-height: 36px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* =====================================================
     BADGES / CHIPS
     ===================================================== */
  .level {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 12px; font-size: 14px; font-weight: 700;
    border-radius: var(--r-pill);
    background: var(--blue-soft); color: var(--blue-strong);
  }
  .level.l1 { background: #d1fae5; color: #065f46; }
  .level.l2 { background: #dbeafe; color: #1e40af; }
  .level.l3 { background: #fef3c7; color: #92400e; }
  .level.l4 { background: #fee2e2; color: #991b1b; }

  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; font-size: 13px; font-weight: 600;
    border-radius: var(--r-pill);
    color: var(--ink-soft); background: var(--soft);
  }
  .tag.green { background: var(--green-soft); color: var(--green); }
  .tag.yellow { background: var(--yellow-soft); color: var(--yellow); }
  .tag.red { background: var(--red-soft); color: var(--red); }
  .tag.blue { background: var(--blue-soft); color: var(--blue-strong); }
  .tag.purple { background: var(--purple-soft); color: var(--purple); }

  /* =====================================================
     CARDS
     ===================================================== */
  .card {
    background: var(--card); border: 2px solid var(--border);
    border-radius: var(--r-lg); padding: 18px 20px;
    transition: transform .1s, border-color .12s, box-shadow .12s;
  }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover {
    border-color: var(--blue); transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .card-title { font-size: 18px; font-weight: 700; color: var(--ink); margin: 0 0 6px; }
  .card-meta { font-size: 14px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .card-grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  }
  .card-list { display: grid; gap: 12px; }

  /* =====================================================
     LESSON LIST (browse)
     ===================================================== */
  .lesson-row {
    display: flex; align-items: center; gap: 14px;
    padding: 16px; background: var(--card);
    border: 2px solid var(--border); border-radius: var(--r);
    cursor: pointer; margin-bottom: 10px;
    transition: border-color .12s;
  }
  .lesson-row:hover { border-color: var(--blue); }
  .lesson-row .num {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--blue-soft); color: var(--blue-strong);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px; flex-shrink: 0;
  }
  .lesson-row .body { flex: 1; }
  .lesson-row .title { font-weight: 700; font-size: 17px; color: var(--ink); margin-bottom: 4px; }
  .lesson-row .info { font-size: 14px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }

  /* =====================================================
     HERO (home)
     ===================================================== */
  .hero {
    background: linear-gradient(135deg, var(--blue-soft), var(--purple-soft));
    border-radius: var(--r-lg); padding: 36px 32px;
    text-align: center; margin-bottom: 24px;
  }
  .hero h1 {
    font-size: clamp(28px, 1.6rem + 1.4vw, 44px);
    font-weight: 800; margin: 0 0 10px;
    color: var(--ink); letter-spacing: -0.02em; line-height: 1.15;
  }
  .hero p {
    font-size: 18px; color: var(--ink-soft);
    margin: 0 auto 22px; max-width: 540px;
  }
  .hero .hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* Big topic tiles on home */
  .topic-tile {
    background: var(--card); border: 2px solid var(--border);
    padding: 22px; border-radius: var(--r-lg);
    cursor: pointer; transition: transform .1s, border-color .12s, box-shadow .12s;
    text-align: left;
  }
  .topic-tile:hover {
    border-color: var(--blue); transform: translateY(-2px); box-shadow: var(--shadow);
  }
  .topic-tile .emoji {
    font-size: 32px; display: block; margin-bottom: 10px;
  }
  .topic-tile h3 {
    margin: 0 0 6px; font-size: 18px; font-weight: 700; color: var(--ink);
  }
  .topic-tile p { margin: 0; color: var(--muted); font-size: 14px; }

  /* =====================================================

  .back-top {
    position: fixed; bottom: 24px; left: 24px; z-index: 80;

    opacity: 0; transform: translateY(20px); pointer-events: none;

  .back-top.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

  /* Helpful buttons (thumbs) */
  .helpful {

  }
  .thumb:hover { background: var(--soft-2); }
  .thumb.up.active { background: var(--green-soft); border-color: var(--green); color: var(--green); }
  .thumb.down.active { background: var(--red-soft); border-color: var(--red); color: var(--red); }

  /* Print */
  @media print {
    header.topbar, nav.tabbar, .sidebar, .right-rail, .back-top,
    .info-panel .actions, .helpful, .hamburger, footer.footer,

</style>

<script>

      "kira": { handle: "kira", points: 240, reviewerFor: [{topicId:"elec-digital", maxLevel: 4}], badges: ["star_helper","teacher","ten_checks"] },
      "otto": { handle: "otto", points: 188, reviewerFor: [{topicId:"elec-digital", maxLevel: 3}, {topicId:"elec-analog", maxLevel: 2}], badges: ["many_topics","ten_checks"] },
      "ravi": { handle: "ravi", points: 312, reviewerFor: [{topicId:"elec-digital-cpu", maxLevel: 4}], badges: ["star_helper","teacher"] },
      "mei":  { handle: "mei",  points: 156, reviewerFor: [{topicId:"elec-digital", maxLevel: 3}], badges: ["writer"] },

      { id: "elec", name: "Electronics", emoji: "⚡", parentId: null, blurb: "How to build stuff with circuits." },

      { id: "elec-digital-cpu", name: "Building a computer chip", parentId: "elec-digital" },
      { id: "elec-analog", name: "Analog", parentId: "elec" },
      { id: "elec-power", name: "Power supplies", parentId: "elec" },
      { id: "wood", name: "Woodworking", emoji: "🪵", parentId: null, blurb: "How to make things from wood." },
      { id: "wood-joinery", name: "Joining pieces", parentId: "wood" },
      { id: "bike", name: "Bikes", emoji: "🚲", parentId: null, blurb: "How to fix and build bikes." },
      { id: "brew", name: "Beer brewing", emoji: "🍺", parentId: null, blurb: "How to make your own beer." },
    ],
    lessons: [
      {
        id: "g-bjt", topicId: "elec-digital", level: 1,
        title: "How to build a tiny switch (called a transistor)",
        author: "kira", coAuthors: ["otto"], status: "PUBLISHED",
        thumbsUp: 412, thumbsDown: 9, needsFirst: [],
        publishedAt: Date.now() - 86400000 * 90,
        translations: ["spanish", "german", "japanese"],
        body: `A **transistor** is a tiny switch made of a special material called silicon. Almost every machine that has a computer chip inside it uses transistors. They are the building block of all digital things.\n\n## What you need\n\n- A thin slice of silicon\n- A few special powders that make it conduct electricity\n- A small oven to bake it in\n- A clean workspace (very important!)\n\n## How to do it\n\n1. Start with a clean silicon slice.\n2. Bake it gently so a thin glass layer forms on top.\n3. Add a tiny pattern using a special light.\n4. Sprinkle a powder in one spot and bake it in.\n5. Sprinkle a different powder in another spot and bake again.\n6. Add tiny metal wires to connect the three parts.\n\n## How to check it works\n\nConnect it to a small battery. When you switch the middle wire on, electricity should flow from one side to the other. That means it works as a switch!\n\n## What's next\n\n- Try the lesson on **logic gates** to combine many switches.\n- Read about how computer chips are made.`,

          { id: "m-bjt-diff", name: "The classic way (baking)", isMain: true, uses: 850, body: "Heat is used to push the special powder into the silicon. This is the way most people learn first. It is simple and works well." },

        ],
        wheres: [
          { name: "Mouser — small transistor pack (3-pack)", rating: 4.7 },
          { name: "Digi-Key — classic 2N2222 pack", rating: 4.5 },

        ],
        myVote: 0, foundHelpful: 1247,
      },
      {
        id: "g-nand", topicId: "elec-digital-gates", level: 2,
        title: "How to make a logic gate (the building block of computers)",
        author: "otto", coAuthors: [], status: "PUBLISHED",
        thumbsUp: 188, thumbsDown: 4, needsFirst: ["g-bjt"],
        publishedAt: Date.now() - 86400000 * 40,
        translations: ["spanish"],
        body: `A **NAND gate** is a tiny piece that follows a simple rule: it gives an output of OFF only when both of its inputs are ON. Every other thing a computer can do can be built from these gates. They are the most basic computer building block.\n\n## What you need\n\n- 2 transistors (you can build these using the lesson on transistors!)\n- 3 small resistors (these are tiny parts that slow down electricity)\n- A small 5-volt power supply (like a phone charger)\n\n## How to do it\n\n1. Place the two transistors one on top of the other.\n2. Connect the first input wire to the first transistor.\n3. Connect the second input wire to the second transistor.\n4. Connect the output wire to the top.\n5. Test it with this little chart:\n\n| Input A | Input B | Output |\n|---|---|---|\n| Off | Off | On |\n| Off | On  | On |\n| On  | Off | On |\n| On  | On  | Off |\n\n## What's next\n\n- Try the lesson on flip-flops.\n- Read about how a calculator works inside.`,

          { id: "m-nand-rtl", name: "The simple way", isMain: true, uses: 320, body: "Uses just resistors and transistors. Easy to build at home. A bit slow." },

          { id: "m-nand-cmos", name: "The modern way", isMain: false, uses: 200, body: "Uses different kinds of switches. Used in all phones and laptops today." },
        ],
        wheres: [
          { name: "Adafruit — ready-made gate chip", rating: 4.8 },
          { name: "Mouser — resistor starter kit", rating: 4.6 },
        ],
        myVote: 0, foundHelpful: 412,
      },
      {
        id: "g-alu", topicId: "elec-digital-cpu", level: 3,
        title: "How to build the math part of a computer (with about 74 gates)",
        author: "you", coAuthors: [], status: "IN_REVIEW",
        thumbsUp: 0, thumbsDown: 0, needsFirst: ["g-nand"],
        submittedAt: Date.now() - 86400000 * 2,
        deadline: Date.now() + 86400000 * 5,
        translations: [],

function escapeHtml(s) { return (s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function timeAgo(ts) {
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60) return "just now";
  if (d < 3600) return `${Math.floor(d/60)} minutes ago`;
  if (d < 86400) return `${Math.floor(d/3600)} hours ago`;
  if (d < 86400 * 30) return `${Math.floor(d/86400)} days ago`;
  return `${Math.floor(d/86400/30)} months ago`;
}
function timeLeft(ts) {
  const d = Math.floor((ts - Date.now()) / 1000);
  if (d < 0) return "time's up";
  if (d < 3600) return `${Math.floor(d/60)} minutes`;
  if (d < 86400) return `${Math.floor(d/3600)} hours`;
  return `${Math.floor(d/86400)} days`;
}
function levelTag(l) {
  const cls = `l${Math.min(4, l)}`;
  const names = {1: "Easy", 2: "Medium", 3: "Harder", 4: "Expert"};
  return `<span class="level ${cls}">${names[l] || "L"+l}</span>`;
}
function statusTag(s) {
  const map = {
    PUBLISHED:  ["Published", "green"],
    IN_REVIEW:  ["Being checked", "yellow"],
    RETURNED:   ["Sent back", "red"],
    DRAFT:      ["Draft", ""],
    OPEN:       ["Open", "yellow"],
    LOOKING:    ["Looking into it", "blue"],
    DONE:       ["Done", "green"],
    PROPOSED:   ["Up for vote", "blue"],
    ACCEPTED:   ["Decided yes", "green"],
    REJECTED:   ["Decided no", ""],
    FUNDED:     ["Goal reached", "green"],
  };
  const [label, color] = map[s] || [s.toLowerCase(), ""];
  return `<span class="tag ${color}">${label}</span>`;
}
function getTopic(id) { return state.topics.find(t => t.id === id); }
function getLesson(id) { return state.lessons.find(l => l.id === id); }
function topicPath(id) {
  const p = []; let t = getTopic(id);
  while (t) { p.unshift(t); t = t.parentId ? getTopic(t.parentId) : null; }
  return p;
}
function topicChildren(parentId) { return state.topics.filter(t => t.parentId === parentId); }
function lessonsIn(rootId) {
  const ids = new Set([rootId]); let changed = true;
  while (changed) {
    changed = false;
    for (const t of state.topics) {
      if (t.parentId && ids.has(t.parentId) && !ids.has(t.id)) { ids.add(t.id); changed = true; }
    }
  }
  return state.lessons.filter(l => ids.has(l.topicId));
}
function rootTopics() { return state.topics.filter(t => t.parentId === null); }
function readingTime(text) {
  const w = (text || "").split(/\s+/).filter(Boolean).length;
  return Math.max(1, Math.round(w / 220));
}

// Simple markdown
function md(src) {
  if (!src) return "";
  let s = escapeHtml(src);
  s = s.replace(/```([\s\S]*?)```/g, (_,c)=>`<pre>${c}</pre>`);
  s = s.replace(/^### (.*)$/gm, "<h3>$1</h3>");
  s = s.replace(/^## (.*)$/gm, "<h2>$1</h2>");
  s = s.replace(/^# (.*)$/gm, "<h1>$1</h1>");
  s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\*(.+?)\*/g, "<em>$1</em>");
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/((?:^\|.*\|\n?)+)/gm, (block) => {
    const lines = block.trim().split("\n");
    if (lines.length < 2) return block;
    const rows = lines.map(l => l.trim().slice(1, -1).split("|").map(c => c.trim()));
    const header = rows[0]; const body = rows.slice(2);
    return `<table><thead><tr>${header.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  });
  s = s.replace(/((?:^- .+\n?)+)/gm, (block) => `<ul>${block.trim().split("\n").map(l => `<li>${l.replace(/^- /,"")}</li>`).join("")}</ul>`);
  s = s.replace(/((?:^\d+\. .+\n?)+)/gm, (block) => `<ol>${block.trim().split("\n").map(l => `<li>${l.replace(/^\d+\. /,"")}</li>`).join("")}</ol>`);
  s = s.split(/\n\n+/).map(p => /^<(h\d|ul|ol|pre|table)/.test(p) ? p : `<p>${p.replace(/\n/g,"<br>")}</p>`).join("\n");
  return s;
}

function renderTopicTree(parentId, activeId) {

        ${count ? `<span class="count">${count}</span>` : ""}
      </div>
      ${kids}
    </li>`;
  }).join("")}</ul>`;
}

          <p class="page-subtitle">${list.length} lesson${list.length===1?"":"s"} ${t.blurb ? "· " + escapeHtml(t.blurb) : ""}</p>
        ` : `
          <h1 class="page-title">📚 All lessons</h1>
          <p class="page-subtitle">${list.length} lessons in total. Start with easy ones and work up.</p>
        `}

        ${list.length === 0
          ? `<div class="empty">
              <span class="icon">📖</span>
              <h3>No lessons here yet</h3>
              <p>Want to be the first to write one?</p>
              <button class="btn primary" onclick="go({page:'write'})">Write a lesson</button>
            </div>`
          : [1,2,3,4,5].filter(L => byLevel[L]).map(L => {
              const names = {1:"Easy lessons", 2:"Medium lessons", 3:"Harder lessons", 4:"Expert lessons"};
              return `
                <h2 style="font-size:20px;margin:28px 0 12px;display:flex;align-items:center;gap:10px">
                  ${levelTag(L)} ${names[L] || "Level "+L} <span class="small" style="font-weight:400">· ${byLevel[L].length} lesson${byLevel[L].length===1?"":"s"}</span>
                </h2>
                ${byLevel[L].map((l, idx) => `
                  <div class="lesson-row" onclick="go({page:'lesson', lessonId:'${l.id}'})">
                    <div class="num">${idx+1}</div>
                    <div class="body">
                      <div class="title">${escapeHtml(l.title)}</div>
                      <div class="info">
                        ${statusTag(l.status)}
                        <span>by <a onclick="event.stopPropagation();go({page:'profile',handle:'${l.author}'})">@${l.author}</a></span>
                        <span>${l.publishedAt ? timeAgo(l.publishedAt) : "being checked"}</span>
                        ${l.foundHelpful ? `<span>👍 ${l.foundHelpful} helpful</span>` : ""}
                      </div>
                    </div>
                  </div>
                `).join("")}
              `;
            }).join("")
        }
      </main>
    </div>
  `;
}

/* ---------------- LESSON ---------------- */
function renderLesson(lessonId) {
  const l = getLesson(lessonId);
  if (!l) return `<div class="layout single"><main id="main" class="article"><div class="notice warn"><span class="ne">😕</span><div>That lesson wasn't found.</div></div></main></div>`;
  const t = getTopic(l.topicId);
  const review = state.reviews.find(r => r.lessonId === l.id && r.status === "OPEN");
  const main = l.ways.find(w => w.isMain);
  const others = l.ways.filter(w => !w.isMain);
  const topOther = others.sort((a,b)=>b.uses-a.uses)[0];
  const shouldChange = topOther && main && topOther.uses > main.uses * 1.05;

  const headings = (l.body.match(/^##+ .*/gm) || []).map(h => ({
    level: (h.match(/^#+/) || ["##"])[0].length,
    text: h.replace(/^#+ /, ""),
    id: h.replace(/^#+ /, "").toLowerCase().replace(/[^a-z0-9]+/g, "-"),
  }));

  const rail = headings.length >= 1 ? `
    <h5>On this page</h5>
    <ol id="rail-toc">
      ${headings.map(h => `<li><a href="#${h.id}" data-toc-id="${h.id}">${escapeHtml(h.text)}</a></li>`).join("")}
      <li><a href="#ways" data-toc-id="ways">Different ways to do it</a></li>
      ${l.wheres.length ? `<li><a href="#stuff" data-toc-id="stuff">Where to get the stuff</a></li>` : ""}
    </ol>
    <p style="margin-top:18px"><a onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Top</a></p>
  ` : "";

  let bodyHtml = md(l.body);
  bodyHtml = bodyHtml.replace(/<h2>(.+?)<\/h2>/g, (_,t) => {
    const id = t.toLowerCase().replace(/[^a-z0-9]+/g, "-");
    return `<h2 id="${id}">${t}</h2>`;
  });
  bodyHtml = bodyHtml.replace(/<h3>(.+?)<\/h3>/g, (_,t) => {
    const id = t.toLowerCase().replace(/[^a-z0-9]+/g, "-");
    return `<h3 id="${id}">${t}</h3>`;
  });

  return `
    <div class="layout with-rail">
      <aside class="sidebar" id="sidebar" aria-label="Side menu">${renderSidebar(l.topicId)}</aside>
      <main id="main" class="article" tabindex="-1">

        <div class="breadcrumb">${topicPath(l.topicId).map((s,i,a) =>
          `<a onclick="go({page:'topic', topicId:'${s.id}'})">${escapeHtml(s.name)}</a>${i<a.length-1?'<span class="sep">›</span>':''}`
        ).join("")}</div>

        <h1 class="page-title">${escapeHtml(l.title)}</h1>
        <p class="page-subtitle">
          ${levelTag(l.level)} &nbsp; in ${escapeHtml(t.name)} &nbsp; · &nbsp; ${readingTime(l.body)} min read &nbsp; · &nbsp; ${l.foundHelpful || 0} people found this helpful
        </p>

        ${review ? `
          <div class="notice tip">
            <span class="ne">📝</span>
            <div>
              <strong>This lesson is being checked right now.</strong> ${review.votes.length} of ${review.checkers.length} checkers have voted. ${timeLeft(review.deadline)} left.
              ${canCheck(state.currentUser, l) ? ` <a onclick="go({page:'review', reviewId:'${review.id}'})">Check it yourself →</a>` : ""}
            </div>
          </div>
        ` : ""}

        ${l.needsFirst.length > 0 ? `
          <div class="before-box">
            <div class="title">📚 Before this lesson, learn:</div>
            ${l.needsFirst.map(id => {
              const p = getLesson(id);
              return p ? `<a class="lesson-link" onclick="go({page:'lesson', lessonId:'${p.id}'})">${levelTag(p.level)} ${escapeHtml(p.title)}</a>` : "";
            }).join("")}
          </div>
        ` : `
          <div class="notice ok">
            <span class="ne">🌱</span>
            <div><strong>This is a starter lesson.</strong> You don't need to know anything beforehand.</div>
          </div>
        `}

        <div class="info-panel" role="complementary">
          <div class="ip-title">About this lesson</div>
          <dl>
            <dt>Topic</dt>
            <dd><a onclick="go({page:'topic', topicId:'${t.id}'})">${escapeHtml(t.name)}</a></dd>
            <dt>How hard</dt>
            <dd>${levelTag(l.level)}</dd>
            <dt>Status</dt>
            <dd>${statusTag(l.status)}</dd>
            <dt>Who wrote it</dt>
            <dd><a onclick="go({page:'profile', handle:'${l.author}'})">@${l.author}</a>${(l.coAuthors||[]).length ? " and " + l.coAuthors.map(c => `<a onclick="go({page:'profile',handle:'${c}'})">@${c}</a>`).join(", ") : ""}</dd>
            <dt>${l.publishedAt ? "Published" : "Submitted"}</dt>
            <dd>${timeAgo(l.publishedAt || l.submittedAt)}</dd>
            <dt>How many people liked it</dt>
            <dd>👍 ${l.thumbsUp} &nbsp; 👎 ${l.thumbsDown}</dd>
            ${(l.translations||[]).length ? `<dt>Other languages</dt><dd>${l.translations.join(", ")}</dd>` : ""}
          </dl>
          <div class="actions">
            <div class="act" onclick="thank('${l.id}')">💚 Say thanks to the author</div>
            <div class="act" onclick="alert('Edit feature — coming soon!')">✏️ Suggest a change</div>
            <div class="act" onclick="alert('History feature — coming soon!')">📜 See past versions</div>
            <div class="act" onclick="alert('Translation feature — coming soon!')">🌍 Add a translation</div>
            <div class="act" onclick="openProblem('${l.id}')">⚠️ Tell us about a problem</div>
          </div>
        </div>

        <div class="lesson-body">${bodyHtml}</div>

        <div class="helpful">
          <span class="lbl">Was this lesson helpful?</span>
          <button class="thumb up ${l.myVote===1?'active':''}" onclick="thumbsLesson('${l.id}', 1)">👍 Yes (${l.thumbsUp})</button>
          <button class="thumb down ${l.myVote===-1?'active':''}" onclick="thumbsLesson('${l.id}', -1)">👎 Not really (${l.thumbsDown})</button>
        </div>

        <h2 id="ways" style="font-size:24px;font-weight:700;margin:32px 0 12px">🛠️ Different ways to do it</h2>
        <p class="small">There's usually more than one way to do something. The community picks the main way, but you can try the others too.</p>

        ${shouldChange ? `
          <div class="notice tip">
            <span class="ne">⚐</span>
            <div>People are using <strong>${escapeHtml(topOther.name)}</strong> more than the main way now. <a onclick="changeWay('${l.id}', '${topOther.id}')">Vote to make it the new main way</a>.</div>
          </div>
        ` : ""}

        ${[...l.ways].sort((a,b) => (b.isMain?1:0)-(a.isMain?1:0)).map(w => `
          <div class="method ${w.isMain?'main':''}">
            <div class="mt">
              ${escapeHtml(w.name)}
              ${w.isMain ? '<span class="badge-main">Main way</span>' : ''}
            </div>
            <div class="lesson-body" style="font-size:16px">${md(w.body)}</div>
            <p class="small" style="margin-top:8px">${w.uses.toLocaleString()} people have used this way</p>
          </div>
        `).join("")}

        ${l.wheres.length ? `
          <h2 id="stuff" style="font-size:24px;font-weight:700;margin:32px 0 12px">🛒 Where to get the stuff</h2>
          <p class="small">If you want to buy the parts, here are some good shops. We sometimes get a tiny tip from the shop, which helps keep this site free. No ads, no popups, ever.</p>
          ${l.wheres.sort((a,b)=>b.rating-a.rating).map(v => `
            <div class="vendor">
              <span style="flex:1;font-weight:600">${escapeHtml(v.name)}</span>
              <span class="stars">${"★".repeat(Math.round(v.rating))}${"☆".repeat(5-Math.round(v.rating))}</span>
              <span class="small">${v.rating.toFixed(1)}</span>
            </div>
          `).join("")}
        ` : ""}

      </main>
      <aside class="right-rail" aria-label="On this page">
        ${rail}
      </aside>
    </div>
  `;
}

function thumbsLesson(id, dir) {
  const l = getLesson(id); if (!l) return;
  if (l.myVote === dir) {
    if (dir === 1) l.thumbsUp--; else l.thumbsDown--;
    l.myVote = 0;
  } else {
    if (l.myVote === 1) l.thumbsUp--; if (l.myVote === -1) l.thumbsDown--;
    if (dir === 1) l.thumbsUp++; else l.thumbsDown++;
    l.myVote = dir;
  }
  save(); render();
}
function thank(id) {
  const l = getLesson(id); if (!l) return;
  l.foundHelpful = (l.foundHelpful || 0) + 1;
  if (state.users[l.author]) state.users[l.author].points += 1;
  (l.coAuthors || []).forEach(c => { if (state.users[c]) state.users[c].points += 1; });
  save(); toast(`Thanks sent to @${l.author}!`); render();
}
function canCheck(handle, lesson) {
  const u = state.users[handle]; if (!u) return false;
  return u.reviewerFor.some(r => {
    let cur = getTopic(lesson.topicId);
    while (cur) {
      if (cur.id === r.topicId && r.maxLevel >= lesson.level) return true;
      cur = cur.parentId ? getTopic(cur.parentId) : null;
    }
    return false;
  });
}
function changeWay(lid, wid) { toast("A vote has been opened to change the main way."); }
function openProblem(lid) {
  const kind = prompt("What kind of problem?\n\n1 — Something is wrong in the lesson\n2 — The level is wrong (too easy or too hard)\n3 — A checker did something unfair\n4 — A topic should be moved\n\nType 1, 2, 3, or 4:", "1");
  if (!kind) return;
  const body = prompt("Tell us about it (at least a sentence):");
  if (!body || body.length < 20) { toast("Please write a bit more so we can understand."); return; }
  const kinds = ["WRONG_INFO", "WRONG_LEVEL", "CHECKER_PROBLEM", "TOPIC_TREE"];
  state.problems.unshift({
    id: "d-" + Date.now(), whoOpened: state.currentUser,
    lessonId: lid, kind: kinds[+kind-1] || "WRONG_INFO",
    body, status: "OPEN", whenOpened: Date.now(),
  });
  save(); toast("Problem reported. Helpers will look at it.");
  go({page: "problems"});
}

/* ---------------- WRITE ---------------- */
let writeState = null;
function renderWrite() {
  if (!writeState) {
    writeState = {
      step: 1, topicId: "elec-digital", level: 1, needsFirst: [],
      title: "", body: "Start with a sentence that explains what this lesson is for in **bold**.\n\n## What you need\n\n- \n\n## How to do it\n\n1. \n",
      ways: [{name: "The simple way", body: "Describe the easiest way to do this.", isMain: true}],
      licenseOk: false, coAuthors: [],
    };
  }
  const ws = writeState;
  const okFirst = state.lessons.filter(l => l.status === "PUBLISHED" && l.level < ws.level);
  const matchingWishes = state.wishes.filter(w => w.status !== "RESOLVED" && (w.topicId === ws.topicId || topicPath(ws.topicId).some(s => s.id === w.topicId)) && w.forLevel === ws.level);

  return `
    <div class="layout">
      <aside class="sidebar" id="sidebar" aria-label="Side menu">${renderSidebar()}</aside>

            <label>What's the lesson about?</label>

            </select>
          </div>

            <label>How hard is it?</label>
            <div class="pick-list">
              <div class="pick ${ws.level===1?'sel':''}" onclick="writeState.level=1;writeState.needsFirst=[];render()">🟢 Easy</div>
              <div class="pick ${ws.level===2?'sel':''}" onclick="writeState.level=2;writeState.needsFirst=[];render()">🔵 Medium</div>
              <div class="pick ${ws.level===3?'sel':''}" onclick="writeState.level=3;writeState.needsFirst=[];render()">🟡 Harder</div>
              <div class="pick ${ws.level===4?'sel':''}" onclick="writeState.level=4;writeState.needsFirst=[];render()">🔴 Expert</div>
            </div>
            <p class="form-hint">Easy lessons don't need any other lessons first. Harder lessons need easier ones first.</p>
          </div>

          ${matchingWishes.length ? `
            <div class="notice tip">
              <span class="ne">🌟</span>
              <div>
                <strong>Good news — people are wishing for a lesson like this!</strong>
                <ul style="margin:6px 0 0">${matchingWishes.map(w => `<li><a onclick="go({page:'wishes'})">${escapeHtml(w.title)}</a> — ${w.pointsAdded}/${w.pointsGoal} points</li>`).join("")}</ul>
                If your lesson matches, you'll get bonus points when it gets published.
              </div>
            </div>
          ` : ""}

          ${ws.level > 1 ? `
            <div class="form-row">
              <label>Which easier lessons should people read first?</label>
              ${okFirst.length === 0
                ? `<div class="notice warn"><span class="ne">⚠️</span><div>There are no easier lessons yet. Please make it easier or write an easier lesson first.</div></div>`
                : `<div class="pick-list">
                  ${okFirst.map(l => `<div class="pick ${ws.needsFirst.includes(l.id)?'sel':''}" onclick="togglePrereq('${l.id}')">${levelTag(l.level)} ${escapeHtml(l.title)}</div>`).join("")}
                </div>`
              }
            </div>
          ` : `<div class="notice"><span class="ne">ℹ️</span><div>Easy lessons don't need anything before them.</div></div>`}
          <div class="actions-row">
            <button class="btn primary big" onclick="writeNext()">Next →</button>
          </div>
        ` : ws.step === 2 ? `
          <div class="form-row">
            <label>What's the lesson called?</label>
            <input id="w-title" value="${escapeHtml(ws.title)}" placeholder="For example: How to bake bread at home" oninput="writeState.title=this.value" />
            <p class="form-hint">Start with "How to…" so it's clear what people will learn.</p>
          </div>
          <div class="form-row">

              ${Object.values(state.users).filter(u => u.handle !== state.currentUser).map(u => `<div class="pick ${ws.coAuthors.includes(u.handle)?'sel':''}" onclick="toggleCoAuthor('${u.handle}')">@${u.handle}</div>`).join("")}
            </div>

              <textarea id="w-body" oninput="writeState.body=this.value;document.getElementById('w-preview').innerHTML=md(this.value)" style="min-height:340px">${escapeHtml(ws.body)}</textarea>
              <div class="md-preview" id="w-preview">${md(ws.body)}</div>

            <p class="form-hint">Use <code>##</code> for big headings, <code>**bold**</code> for emphasis, and lists. The right side shows how it looks.</p>

          <div class="actions-row">
            <button class="btn" onclick="writeBack()">← Back</button>

          `).join("")}

          <div class="actions-row">
            <button class="btn" onclick="writeBack()">← Back</button>
            <button class="btn primary big" onclick="writeNext()">Next →</button>
          </div>
        ` : ws.step === 4 ? `
          <h2 style="font-size:24px;font-weight:700">Sharing rules</h2>
          <div class="lesson-body" style="font-size:17px">
            <p>Every lesson on this site is <strong>free to read, share, and remix</strong>. We use the same rules as Wikipedia.</p>
            <p>This means anyone can:</p>
            <ul>
              <li>Read your lesson without paying</li>
              <li>Share it with others</li>
              <li>Translate it into other languages</li>

          </div>
          <div class="form-row" style="margin-top:16px;background:var(--soft);padding:16px;border-radius:var(--r-lg)">

              <input type="checkbox" style="width:auto;margin-top:4px" ${ws.licenseOk?'checked':''} onchange="writeState.licenseOk=this.checked;render()" />

            </label>
          </div>
          <div class="actions-row">

            <button class="btn primary big" ${ws.licenseOk?'':'disabled'} onclick="writeNext()">Next →</button>

          <h2 style="font-size:24px;font-weight:700">Take one last look</h2>

            <h1 class="page-title" style="font-size:24px">${escapeHtml(ws.title || '(no title)')}</h1>
            <p class="page-subtitle">${levelTag(ws.level)} &nbsp; in ${escapeHtml(getTopic(ws.topicId)?.name)}${ws.coAuthors.length ? " &nbsp; · with " + ws.coAuthors.map(c => "@"+c).join(", ") : ""}</p>

            <button class="btn primary big" onclick="submitLesson()">Send for checking 🚀</button>

}
function attachWriteHandlers() {
  const sel = document.getElementById("w-topic");
  if (sel) sel.onchange = () => { writeState.topicId = sel.value; render(); };
}
function togglePrereq(id) {
  const i = writeState.needsFirst.indexOf(id);
  if (i >= 0) writeState.needsFirst.splice(i,1); else writeState.needsFirst.push(id);
  render();
}
function toggleCoAuthor(h) {
  const i = writeState.coAuthors.indexOf(h);
  if (i >= 0) writeState.coAuthors.splice(i,1); else writeState.coAuthors.push(h);
  render();
}
function setMainWay(i, isMain) {
  if (isMain) writeState.ways.forEach((w,j) => w.isMain = j === i);
  else writeState.ways[i].isMain = false;
  if (!writeState.ways.some(w => w.isMain)) writeState.ways[0].isMain = true;
  render();
}
function writeNext() {
  const ws = writeState;
  if (ws.step === 1) {
    if (ws.level > 1 && ws.needsFirst.length === 0) {
      const candidates = state.lessons.filter(l => l.status === "PUBLISHED" && l.level < ws.level);
      if (candidates.length === 0) { toast("Make it easier — there are no simpler lessons yet."); return; }
      toast("Please pick at least one easier lesson first."); return;
    }
  }
  if (ws.step === 2) {
    if (!ws.title || ws.title.length < 5) { toast("Give it a longer name."); return; }
    if (!ws.body || ws.body.length < 50) { toast("Write a bit more — at least a paragraph."); return; }
  }
  if (ws.step === 3) {
    if (!ws.ways.some(w => w.isMain)) { toast("Pick one way as the main one."); return; }
    if (ws.ways.some(w => !w.name || !w.body)) { toast("Every way needs a name and an explanation."); return; }
  }
  ws.step = Math.min(5, ws.step + 1); render();
}
function writeBack() { writeState.step = Math.max(1, writeState.step - 1); render(); }
function submitLesson() {
  const ws = writeState;
  const id = "g-" + Date.now();
  const eligible = Object.values(state.users).filter(u => u.handle !== state.currentUser && canCheck(u.handle, { topicId: ws.topicId, level: ws.level }));
  let jurySize = Math.min(5, eligible.length); if (jurySize % 2 === 0) jurySize = Math.max(1, jurySize - 1);
  const jury = eligible.sort((a,b) => b.points - a.points).slice(0, jurySize).map(u => u.handle);
  const lesson = {
    id, topicId: ws.topicId, level: ws.level,
    title: ws.title, author: state.currentUser, coAuthors: ws.coAuthors, status: "IN_REVIEW",
    thumbsUp: 0, thumbsDown: 0, needsFirst: ws.needsFirst, body: ws.body, foundHelpful: 0, translations: [],
    submittedAt: Date.now(), deadline: Date.now() + 86400000 * 7,
    ways: ws.ways.map((w,i) => ({ id: "m-"+id+"-"+i, ...w, uses: 0 })),
    wheres: [], myVote: 0,
  };
  state.lessons.push(lesson);
  state.reviews.push({ id: "r-" + id, lessonId: id, deadline: lesson.deadline, status: "OPEN", checkers: jury, votes: [] });
  state.users[state.currentUser].points += 1;
  if (!state.users[state.currentUser].badges.includes("writer")) state.users[state.currentUser].badges.push("writer");
  save(); writeState = null;
  toast(`Sent! ${jury.length} checker${jury.length===1?"":"s"} will look at your lesson.`);
  go({page: "lesson", lessonId: id});
}

function attachReviewHandlers() {
  reviewState = { choice: null, reason: "", showOthers: reviewState.showOthers };
  updateJustCounter();
}
function updateJustCounter() {
  const c = document.getElementById("just-count"); if (!c) return;
  const len = reviewState.reason.length;
  c.textContent = `${len} / 50 letters`;
  c.classList.toggle("ok", len >= 50);
  const btn = document.getElementById("submit-vote");
  if (btn) btn.disabled = !(reviewState.choice && len >= 50);
}
function setReviewChoice(d) {
  reviewState.choice = d;
  document.querySelectorAll("#vote-btns button").forEach(b => b.classList.remove("sel","APPROVE","REJECT","ABSTAIN"));
  event.target.classList.add("sel", d);
  updateJustCounter();
}
function submitVote(rid) {
  const r = state.reviews.find(x => x.id === rid); if (!r) return;
  if (!reviewState.choice) { toast("Pick a choice first."); return; }
  if (reviewState.reason.length < 50) { toast("Please write at least a sentence so the author understands."); return; }
  r.votes.push({ who: state.currentUser, choice: reviewState.choice, reason: reviewState.reason, when: Date.now() });
  const u = state.users[state.currentUser]; u.points += 2;
  const total = state.reviews.reduce((n, rv) => n + rv.votes.filter(v => v.who === state.currentUser).length, 0);
  if (total >= 10 && !u.badges.includes("ten_checks")) u.badges.push("ten_checks");
  if (r.votes.length >= r.checkers.length) closeReview(r);
  save();
  toast("Thanks! Your vote was sent.");
  reviewState = { choice: null, reason: "", showOthers: true };
  render();
}
function closeReview(r) {
  const yes = r.votes.filter(v => v.choice === "APPROVE").length;
  const no = r.votes.filter(v => v.choice === "REJECT").length;
  const l = getLesson(r.lessonId); if (!l) return;
  if (yes > no) {
    l.status = "PUBLISHED"; l.publishedAt = Date.now();
    r.status = "CLOSED_APPROVED";
    state.users[l.author].points += 10;
    state.wishes.forEach(w => {
      if (w.status === "OPEN" || w.status === "FUNDED") {
        const samePath = topicPath(l.topicId).some(s => s.id === w.topicId);
        if (samePath && w.forLevel === l.level && l.title.toLowerCase().includes(w.title.toLowerCase().split(" ")[0])) {
          w.status = "RESOLVED"; w.lessonId = l.id;
          state.users[l.author].points += Math.floor(w.pointsAdded * 0.2);
          if (!state.users[l.author].badges.includes("wish_maker")) state.users[l.author].badges.push("wish_maker");
        }
      }
    });
  } else {
    l.status = "RETURNED"; r.status = "CLOSED_REJECTED";
  }
}

function renderIdea(id) {
  const r = state.ideas.find(x => x.id === id);
  if (!r) return `<div class="layout single"><main id="main" class="article"><div class="notice warn"><span class="ne">😕</span><div>Idea not found.</div></div></main></div>`;
  return `
    <div class="layout single">
      <main id="main" class="article" tabindex="-1">
        <div class="breadcrumb"><a onclick="go({page:'ideas'})">← All ideas</a></div>
        <h1 class="page-title">${escapeHtml(r.title)}</h1>
        <p class="page-subtitle">Idea #${String(r.num).padStart(3,"0")} · by @${r.author} · ${timeAgo(r.whenOpened)} · ${statusTag(r.status)}</p>

        <div class="lesson-body">
          <h2>Why this idea?</h2>
          <p>${escapeHtml(r.why)}</p>
          <h2>The vote so far</h2>
          <ul>
            <li><strong>${r.votesFor}</strong> people say yes</li>
            <li><strong>${r.votesAgainst}</strong> people say no</li>
          </ul>
        </div>

        ${r.status === "PROPOSED" ? `
          <div class="notice tip">
            <span class="ne">🗳️</span>
            <div>Voting is open for 14 days. If 6 out of 10 say yes, the idea is accepted.</div>
          </div>
          <div class="actions-row" style="justify-content:flex-start">
            <button class="btn primary big" onclick="voteIdea('${r.id}', 1)">👍 Yes, I like this</button>
            <button class="btn big" onclick="voteIdea('${r.id}', -1)">👎 No, I don't</button>
          </div>
        ` : `
          <div class="notice ${r.status==='ACCEPTED'?'ok':''}">
            <span class="ne">${r.status==='ACCEPTED'?'✓':'i'}</span>
            <div>This idea is <strong>${statusTag(r.status).replace(/<[^>]*>/g,'').toLowerCase()}</strong>. The choice is kept here so we don't forget why.</div>
          </div>
        `}
      </main>
    </div>
  `;
}
function voteIdea(id, dir) {
  const r = state.ideas.find(x => x.id === id); if (!r) return;
  if (dir === 1) r.votesFor++; else r.votesAgainst++;
  save(); toast("Got your vote!"); render();
}
function openIdea() {
  if (state.users[state.currentUser].points < 5) { toast("You need 5 points to share a new idea."); return; }
  const title = prompt("What's your idea?");
  if (!title) return;
  const why = prompt("Why is this a good idea?");
  if (!why) return;
  state.ideas.unshift({
    id: "rfc-" + Date.now(),
    num: Math.max(...state.ideas.map(r => r.num)) + 1,
    title, why, status: "PROPOSED",
    author: state.currentUser, whenOpened: Date.now(),
    votesFor: 1, votesAgainst: 0,
  });
  save(); toast("Idea shared! Voting is open."); render();
}

    { emoji: "✅", title: "Checkers", who: "People who passed a topic test", desc: "Read new lessons and vote on whether they're ready to go up. Each topic and level needs a separate test.", count: Object.values(state.users).filter(u=>u.reviewerFor.length).length },
    { emoji: "⚖️", title: "Judges", who: "Picked by senior checkers", desc: "Sort out problems and approve new topics. Judges don't write or vote on lessons themselves.", count: 2 },
    { emoji: "⭐", title: "Teachers (mentors)", who: "People with lots of points", desc: "Help new checkers get ready for their tests. They earn the Teacher badge when they help 3 people pass.", count: Object.values(state.users).filter(u=>u.badges.includes("teacher")).length },
    { emoji: "👮", title: "Friendly moderators", who: "Picked at the start", desc: "Watch out for spam and rude behavior. Keep things friendly on the site.", count: 3 },

              <div style="font-size:32px;margin-bottom:8px">${r.emoji}</div>

              <p style="color:var(--ink-soft);margin:6px 0;font-size:15px">${r.desc}</p>
              <p class="small"><strong>Who:</strong> ${r.who}</p>
            </div>
          `).join("")}
        </div>

        <h2 style="font-size:24px;margin-top:28px">We're looking for…</h2>
        <p style="color:var(--ink-soft)">These jobs are open right now. If you'd like one, say hello on <a href="https://github.com/SebReyWriter/TheBLUEForum/discussions" target="_blank" rel="noopener">the forum</a>.</p>
        <div class="card-grid">
          ${state.openJobs.map(r => `
            <div class="card">
              <div class="card-title">${escapeHtml(r)}</div>
              <p style="margin-top:8px"><a href="https://github.com/SebReyWriter/TheBLUEForum/discussions" target="_blank" rel="noopener">Ask about this job →</a></p>
            </div>
          `).join("")}
        </div>

        <h2 style="font-size:24px;margin-top:28px">Top helpers</h2>
        <div class="card-grid">
          ${Object.values(state.users).sort((a,b)=>b.points-a.points).slice(0,6).map(u => `
            <div class="card clickable" onclick="go({page:'profile', handle:'${u.handle}'})">
              <div style="display:flex;gap:12px;align-items:center">

/* ---------------- PROFILE ---------------- */
function renderProfile(handle) {
  const u = state.users[handle] || state.users[state.currentUser];
  const written = state.lessons.filter(l => l.author === u.handle || (l.coAuthors || []).includes(u.handle));
  const myVotes = state.reviews.flatMap(r => r.votes.filter(v => v.who === u.handle).map(v => ({...v, lessonId: r.lessonId})));
  return `
    <div class="layout single">
      <main id="main" class="article" tabindex="-1">
        <div class="row" style="align-items:center;gap:20px;margin-bottom:24px">
          <div class="avatar lg">${u.handle.slice(0,1).toUpperCase()}</div>
          <div>
            <h1 class="page-title" style="margin:0">@${escapeHtml(u.handle)}</h1>
            <p class="small">${u.points} points · ${u.reviewerFor.length} topic${u.reviewerFor.length===1?"":"s"} · ${written.length} lesson${written.length===1?"":"s"} written</p>
            <div class="row" style="gap:6px;margin-top:8px">
              ${u.badges.map(b => BADGES[b] ? `<span class="tag ${BADGES[b].color}" title="${BADGES[b].label}">${BADGES[b].label}</span>` : "").join("")}
            </div>

        </div>

        <h2 style="font-size:22px">Topics they can check</h2>

          ? `<p class="small">Not a checker yet. <a onclick="go({page:'become-checker'})">Become one →</a></p>`
          : `<div class="card-grid">${u.reviewerFor.map(r => `
              <div class="card">
                <div class="card-title">${escapeHtml(getTopic(r.topicId)?.name)}</div>
                <p class="small">Up to ${["Easy","Medium","Harder","Expert"][r.maxLevel-1]}</p>
              </div>
            `).join("")}</div>`
        }

        <h2 style="font-size:22px;margin-top:28px">Lessons written (${written.length})</h2>
        ${written.length === 0 ? `<p class="small">No lessons yet.</p>` : `<div class="card-list">${written.map(l => `
          <div class="card clickable" onclick="go({page:'lesson',lessonId:'${l.id}'})">
            <div class="card-title">${escapeHtml(l.title)}</div>
            <div class="card-meta">${statusTag(l.status)} · ${levelTag(l.level)} · 👍 ${l.thumbsUp} · 👎 ${l.thumbsDown}${l.foundHelpful?` · ${l.foundHelpful} thanks`:''}</div>
          </div>
        `).join("")}</div>`}

        <h2 style="font-size:22px;margin-top:28px">Recent checks (${myVotes.length})</h2>
        ${myVotes.length === 0 ? `<p class="small">No checks done yet.</p>` : myVotes.slice(0,10).map(v => `
          <div class="vote-row">
            <span class="what ${v.choice}">${v.choice}</span>

            <span class="small">· ${timeAgo(v.when)}</span>
            <div class="reason">${escapeHtml(v.reason)}</div>
          </div>
        `).join("")}
      </main>
    </div>
  `;
}

/* =====================================================
   FIND (search overlay)
   ===================================================== */
function openFind() {
  document.getElementById("find").classList.add("open");
  const i = document.getElementById("find-input"); i.value = ""; i.focus();
  renderFind();
}
function closeFind() { document.getElementById("find").classList.remove("open"); }
let findSel = 0;
let findResults = [];
function renderFind() {
  const q = document.getElementById("find-input").value.toLowerCase().trim();
  const results = [];
  state.lessons.forEach(l => {
    const score = q ? (l.title.toLowerCase().includes(q) ? 2 : (l.body.toLowerCase().includes(q) ? 1 : 0)) : 1;
    if (score) results.push({ kind: "Lesson", text: l.title, action: () => { closeFind(); go({page:"lesson", lessonId: l.id}); } });
  });
  state.topics.forEach(s => {
    if (!q || s.name.toLowerCase().includes(q)) results.push({ kind: "Topic", text: s.name, action: () => { closeFind(); go({page:"topic", topicId: s.id}); }});
  });
  state.lessons.forEach(l => l.ways.forEach(w => {
    if (q && w.name.toLowerCase().includes(q)) results.push({ kind: "Way", text: `${w.name} (in ${l.title})`, action: () => { closeFind(); go({page:"lesson", lessonId: l.id}); }});
  }));
  state.wishes.forEach(w => {
    if (!q || w.title.toLowerCase().includes(q)) results.push({ kind: "Wish", text: w.title, action: () => { closeFind(); go({page:"wishes"}); }});
  });
  state.ideas.forEach(r => {
    if (!q || r.title.toLowerCase().includes(q)) results.push({ kind: "Idea", text: r.title, action: () => { closeFind(); go({page:"idea", ideaId: r.id}); }});
  });
  findSel = 0;
  const el = document.getElementById("find-results");
  el.innerHTML = results.slice(0, 18).map((r,i) => `<div class="find-result ${i===0?'sel':''}" data-i="${i}"><span class="kind ${r.kind}">${r.kind}</span> ${escapeHtml(r.text)}</div>`).join("") || `<div class="find-result small">Nothing found.</div>`;
  el.querySelectorAll(".find-result[data-i]").forEach(r => { r.onclick = () => results[+r.dataset.i].action(); });
  findResults = results;
}
function findKey(e) {
  if (e.key === "Escape") closeFind();
  if (e.key === "Enter") { if (findResults[findSel]) findResults[findSel].action(); }
  if (e.key === "ArrowDown" || e.key === "ArrowUp") {
    e.preventDefault();
    findSel = Math.max(0, Math.min(findResults.length-1, findSel + (e.key==="ArrowDown"?1:-1)));
    document.querySelectorAll("#find-results .find-result").forEach((r,i) => r.classList.toggle("sel", i===findSel));
  }
}

/* =====================================================
   Right-rail scrollspy
   ===================================================== */
function updateRailActive() {
  const links = document.querySelectorAll("#rail-toc a");
  if (!links.length) return;
  let active = null;
  const y = window.scrollY + 100;
  links.forEach(a => {
    const el = document.getElementById(a.dataset.tocId);
    if (el && el.offsetTop <= y) active = a;
  });
  links.forEach(a => a.classList.toggle("active", a === active));
}
window.addEventListener("scroll", updateRailActive, { passive: true });

      <div class="actions-row" style="justify-content:center">
